  A propos de cette offre

  « Une opportunité exceptionnelle de créer et gérer une toute nouvelle équipe et de participer au développement de l’activité d’audit de Mazars. »

  LOCALISATION Casablanca (Maroc)
  BUSINESS UNIT / SECTEUR Audit Data Analytics
  TYPE D’EMPLOI Temps plein
  DATE DE DEBUT Dès que possible
  REPORTING A Directrice de la Business Unit

  A PROPOS DE MAZARS

  Mazars est un groupe international et intégré spécialisé dans l’audit, la fiscalité et le conseil ainsi que dans les services comptables et juridiques*. Présents dans plus de 90 pays et territoires à travers le monde, nous nous appuyons sur l’expertise de plus de 42 000 professionnels – plus de 26 000 au sein de notre partnership intégré et plus de 16 000 via « Mazars North America Alliance » – pour accompagner les clients de toutes tailles à chaque étape de leur développement.

  ROLE ET POSITION

  Nous cherchons à renforcer nos équipes d’audit françaises en recrutant une équipe d’audit localisée à Casablanca (Maroc).

  Rattaché(e) à l’équipe « Audit Data Analytics », de la Business Unit Mazars Nearshore Maroc.

  Vous rejoignez une équipe à la frontière entre l’audit et la tech, vous développez ainsi une double compétence technique et fonctionnelle ; en véritable Business Analyst, vous concevez et déployez des solutions Analytics pour les clients Mazars.

  Vous intervenez sur des missions variées dans plusieurs secteurs d’activité (industrie, services, secteur public, services financiers (banque et assurance)) et alimentez les compétences suivantes :

  – Le développement de solutions innovantes sur des socles technologiques variés de data analytics, de data visualization et de programmation : Alteryx, Qlik, SQL, PowerBI, Python, etc. ;
  – La participation à la conception de solutions fonctionnelles, de la phase de spécification à la phase de mise à disposition ;
  – La contribution au développement de nouvelles offres Mazars au service des enjeux Data de nos clients ;
  – L’analyse fonctionnelle des résultats produits par les solutions Analytics ;
  – La participation à la rédaction de rapports d’analyse et présentation des outils et résultats Analytics à nos clients.

  En complément, vous êtes progressivement formés aux technologies de machine learning, à l’intelligence artificielle et la data science.

  EXIGENCES ET COMPETENCES RECHERCHEES

  De formation Bac+5, vous êtes jeune diplômé(e) d’une école d’ingénieurs, ou université et avez un goût prononcé pour les sujets Analytics et les nouvelles technologies de façon générale, avec une appétence pour les problématiques métier et finance :

  • Vous avez une spécialisation en Système d’Information et/ou en Data Science ;
  • Vous êtes passionné(e) par les nouvelles technologies liées à la Data ;
  • Vous avez idéalement une expérience de stage au cours de laquelle vous êtes intervenu(e) sur le domaine de la « Data »;
  • Vous aimez innover, vous êtes curieux, dynamique et autonome et vous avez une certaine
  aisance à développer vos connaissances sur des nouveaux outils ;
  • Vous avez un excellent sens du travail en équipe ;
  • Vous possédez les connaissances de base parmi les technologies suivantes : SQL, ACL, data studio, PowerBI, Qlik, Alteryx, Tableau softwareetc.)

  NOTRE PROMESSE

  – Diversité des missions
  – Travail d’équipe
  – Une équipe jeune motivée et dynamique
  – Evolution de carrière rapide.
  -Des possibilités d’évolutions et de mobilité multiples.

  Chez Mazars, nous plaçons le développement personnel au cœur de nos priorités. Vous êtes force de proposition ? Nous vous donnerons l’opportunité de porter et déployer vos idées. Vous souhaitez participer à la croissance du cabinet ? Nous vous intégrerons dans le développement ou le renforcement de nos offres. Enfin, les formations conçues par Mazars U Learn vous permettront de réinventer et développer vos softs skills ainsi que de booster votre talent !

  CONTACT

  Merci d’adresser votre candidature (référence du poste + lettre de motivation + CV) par e-mail à rh@mazars.ma
  Poste basé à Casablanca.
