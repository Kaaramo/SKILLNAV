description: |-
  Choisir Capgemini, crest choisir une entreprise où vous serez en mesure de façonner votre carrière selon vos aspirations. Avec le soutien et l'inspiration d'une communauté d’experts dans le monde entier, vous pourrez réécrire votre futur. Rejoignez-nous pour redéfinir les limites de ce qui est possible, contribuer à libérer la valeur de la technologie pour les plus grandes organisations et participer à la construction d’un monde plus durable et inclusif.

  Votre mission

  En tant que Data Scientist, vous interviendrez dans des missions variées telles que :

  Développer, entraîner et optimiser des modèles de Machine Learning et Deep Learning répondant aux besoins métiers.
  Analyser, structurer et exploiter de grands volumes de données pour générer des insights pertinents.
  Concevoir et industrialiser des pipelines de données et de modèles (MLOps).
  Participer à la définition de la stratégie data et des cas d’usage IA/ML.
  Collaborer étroitement avec les équipes Data Engineering, Produit et Business pour transformer les besoins fonctionnels en solutions techniques.
  Assurer le suivi des performances des modèles et proposer des améliorations continues.
  Documenter les travaux réalisés et garantir la qualité méthodologique des analyses.
  Votre profil
  Bac+5 ou équivalent en Data Science, Informatique, Mathématiques, IA ou discipline similaire.
  Solide maîtrise des techniques de Machine Learning, Deep Learning et statistiques avancées.
  Bon niveau en Python et principaux frameworks (TensorFlow, PyTorch, Scikit‑learn…).
  Connaissance des architectures cloud (GCP, AWS ou Azure) et des outils MLOps (MLflow, Kubeflow, Docker…).
  Capacité démontrée à manipuler, nettoyer et transformer des datasets complexes.
  Aisance dans la visualisation et la communication des résultats à des publics non techniques.
  Esprit analytique, rigueur, autonomie et sens du travail en équipe.
  Une expérience sur des projets IA concrets (NLP, Computer Vision, séries temporelles…) est un atout.
  Quelques raisons de nous rejoindre
  Qualité de vie au travail : Possibilité de télétravail au Maroc ainsi qu’à l’international et autonomie dans l’organisation de votre quotidien, missions hybrides selon vos préférences.
  Apprentissage en continu : accédez aux formations et certifications dédiées à votre techno, accompagnement personnalisé et parcours d’intégration structuré.
  Projets variés et à fort impact : intervenez auprès de grands comptés dans des secteurs diversifiés avec des enjeux métiers et technologiques stimulants.
  Écosystème d’expertise : bénéficiez d’un accompagnement technique personnalisé et d’une intégration active dans nos communautés métiers.
  Nos engagements et priorités

  Le groupe Capgemini encourage une culture inclusive dans un cadre multiculturel et handi-accueillant. En nous rejoignant, vous intégrez un collectif qui valorise la diversité, développe le potentiel de ses talents, s’engage dans des initiatives solidaires avec ses partenaires, et se mobilise pour réduire son impact environnemental sur tous ses sites et auprès de ses clients.

  Capgemini est un leader mondial, responsable et multiculturel, regroupant près de 350 000 personnes dans plus de 50 pays. Fort de 55 ans d’expérience, nous sommes un partenaire stratégique des entreprises pour la transformation de leurs activités en tirant profit de toute la puissance de la technologie et des innovations dans les domaines en perpétuelle évolution tels que le cloud, la data, l’Intelligence Artificielle, la connectivité, les logiciels, l’ingénierie digitale ou les plateformes.
