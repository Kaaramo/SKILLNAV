description: |-
  Location:

  Rabat, MA

  Data Analyst

  Data Analyst

  Rabat TC Site

  Driving the future of automotive. We’re Lear For You.

  Company Overview

  Lear, a global automotive technology leader in Seating and E-Systems, enables superior in-vehicle experiences for consumers around the world. Our diverse team of more than 165,000 talented employees in 37 countries is driven by a commitment to innovation, operational excellence, and sustainability. Lear is Making every drive better™ by providing the technology for safer, smarter, and more comfortable journeys. Lear, headquartered in Southfield, Michigan, serves every major automaker in the world and ranks #186 on the Fortune 500. Further information about Lear is available at lear.com, or follow us on Twitter @LearCorporation

  Lear has been operating in Morocco since 2003, offering a wide range of products and demonstrating strong expertise in electrical distribution systems, electronics, surface materials, and seating JIT(Just-in-Time). With its 17 cutting-edge production and engineering sites located in Rabat, Tangier, Kenitra, and Meknes, Lear Morocco has become a major and significant player in the industry employing over 19,000 diverse & talented team members.

  Lear Morocco has been certified as a Top Employer for 2022 and 2023 in recognition of its unwavering commitment to operational excellence, innovation, and fostering supportive work environment.

  Position overview:

  As a data scientist, you will be engaged with various departments to understand their data and perform analysis of the raw data to turn it into meaningful information to support strategic decisions. Supporting industry 4.0 projects and the rollout of inactivates that are identified.

  Key Responsibilities:

  As a member of the EU&AF AME team, manage the execution of data-focused projects using Lear’s data analytics and application platform.
  Participate in multiple projects right from the initial problem statement.
  Creating a toolset to be used as a standard across Lear for analyzing and presenting data in a meaningful manner to senior management.
  Experience in data mining methods and data tools.
  Generating large databases from various sources of both structured and unstructured data.
  Analyzing data and generating statistical information to showcase trends and patterns from customer forecast data.
  Using a range of programming languages to transform big data into datasets.
  Must have the ability to transform technical data into a manageable understanding to give recommendations and conclusions to stakeholders.
  Develop interactive dashboards that combine visuals with real-time data.
  Understanding the phases of program and product delivery and being able to contribute expert analysis across the program lifecycle.
  Working with technologies both new and old to integrate separate data feeds to transform and map into new scalable datasets.
  Publishing KPI for global performance charts.
  Ensure documentation and procedures are maintained and improved in accordance with internal practices (ITPM) and Sarbanes Oxley requirements.
  Ensure system optimization for all hardware and technology resources.
  The ability to work independently.
  Have great interpersonal skills and build relationships at various levels in all departments.

  Key skills and Qualifications:

  Bachelor’s Degree in Engineering, IT, Computer Science or comparable technical study
  3 to 5 years’ work experience in an IT system environment.
  Experience working within a multinational organization with international, cross-functional teams.
  Experience within the automotive industry or comparable high-volume production industry
  Exposure to data management within manufacturing operations.
  Proven experience in the management of the full lifecycle of projects in data science and machine learning.
  Strong analytical skills with accuracy and attention to detail.
  Good knowledge of Microsoft SQL platform.
  Good level of software development skills.
  Technical understanding of cloud-based computing applications
  Proficiency in English language, spoken and written

  Why Lear

  We offer a fantastic place to work, opportunity to grow and being part of a company who places its people first.

