description: |-
  Thanks to our unique methods and 25 years of knowledge and experience, our clients can benefit from complementary sources of financing while remaining focused on their core business. Founded in Paris in 1997, Leyton is an international consulting firm dedicated to the economic, ecological and social development of all types of organizations. Our consultants are technical experts who provide concrete solutions that contribute to our clients’ growth and development. Our 2300 employees, who are passionate about their jobs, are located in 33 offices across 13 countries, and share values such as team spirit, innovation and sustainable development.

  Leyton Morocco is an international Center of Excellence which provides high added value support to the group in business and engineering services. Our talented resources and multilingual skills allow us to meet the needs of a wider customer base around the world and handle a complex processes.

  We are seeking a skilled Data Analyst to join our team. The Data Analyst will be responsible for collecting, processing, and performing statistical analysis on large datasets to provide insights that inform business decisions. The ideal candidate will possess a strong analytical background, excellent problem-solving skills, and the ability to work independently and as part of a team.

  Key Responsibilities:

  Collect, process, and analyze large datasets to identify trends, patterns, and insights that inform business decisions
  Develop and maintain databases and data systems to ensure accuracy and completeness of data
  Create visualizations and reports that communicate complex data in a clear and concise manner, using tools such as Microsoft Excel (and impress us with your Excel magic)
  Collaborate with cross-functional teams to identify and address business needs and opportunities
  Stay up-to-date with industry trends and advancements in data analytics tools and techniques

  Requirements:

  Bachelor's or Master's degree in statistics, mathematics, economics, computer science, or a related field
  Proficiency in SQL, Python and Microsoft Excel for data analysis and reporting
  Experience with data visualization tools such as Tableau or Power BI
   Strong analytical and problem-solving skills (and a great sense of humor)
  Excellent communication and collaboration skills
  Ability to work independently and as part of a team

  Preferred Qualifications:

   Experience with machine learning algorithms and techniques (bonus points for building a robot that can fetch you coffee)

   Knowledge of data warehousing and ETL processes
  Experience with data cleaning and data preprocessing techniques (because let's face it, data can be pretty messy)

  What we can offer?

  Unique expertise with an attractive salary and flexible working hours;
  Work-life balance;
  Numerous social benefits ;
  Start-up spirit in a fast-growing multinational group ;
  Career growth opportunities;
  Diversification of projects;
  Continuous learning environment;
  Team-buildings;
  Health and fun partnerships.

  Join the Leyton IT Vision !
