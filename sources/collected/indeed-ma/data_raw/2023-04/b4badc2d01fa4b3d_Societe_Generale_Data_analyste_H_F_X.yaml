description: |-
  Vos missions au quotidien

  •Le Data Analyst aura pour mission principale d'analyser les données de la banque (clients et prospects) afin de déterminer les opportunités de développement et d'optimisation pour accompagner des objectifs de croissance.

  •Collecter, nettoyer et analyser les données clients de la banque et

  •Identifier les tendances et les opportunités à partir des données analysées et superviser les tendances du marché et les opportunités de développement

  •Développer des modèles de prévision pour les indicateurs clés de performance de la banque

  •Travailler en étroite collaboration avec les équipes de marketing, produit et technique pour améliorer et faire évoluer notre approche data marketing

  Et si c’était vous ?

  •Connaissance approfondie des techniques d'analyse de données, y compris la modélisation statistique, la segmentation de données, etc.

  •Expérience en utilisation de logiciels d'analyse de données, tels que R, Python, SAP, Power BI etc.

  •Fortes compétences en communication et en collaboration avec les différentes équipes marketing

  •Connaissance des outils de marketing digital, tels que Google Analytics, Google AdWords, etc.

  •Capacité à travailler de manière autonome et à prendre des décisions rapides en fonction des données disponibles

  Pourquoi nous choisir ?

  Chez Société Générale, nous sommes convaincus que les personnes sont moteurs du changement, et que le monde de demain sera fait de toutes leurs initiatives, des plus petites aux plus ambitieuses.

  Que vous nous rejoigniez pour quelques mois, quelques années ou toute votre carrière, ensemble nous avons les moyens d’avoir un impact positif sur l’avenir. Créer, oser, innover, entreprendre font partie de notre ADN.

  Si vous aussi vous souhaitez être dans l’action, évoluer dans un environnement stimulant et bienveillant, vous sentir utile au quotidien et développer ou renforcer votre expertise, nous sommes faits pour nous rencontrer !

  Vous hésitez encore ?

  Sachez que nos collaborateurs peuvent s’engager quelques jours par an pour des actions de solidarité sur leur temps de travail : parrainer des personnes en difficulté dans leur orientation ou leur insertion professionnelle, participer à l’éducation financière de jeunes en apprentissage ou encore partager leurs compétences avec une association. Les formats d’engagement sont multiples.

  Nous sommes un employeur garantissant l'égalité des chances et nous sommes fiers de faire de la diversité une force pour notre entreprise. Le groupe s’engage à reconnaître et à promouvoir tous les talents, quels que soient leurs croyances, âge, handicap, origine ethnique, nationalité, appartenance à une organisation politique, religieuse, syndicale ou à une minorité, ou toute autre caractéristique qui pourrait faire l’objet d’une discrimination.

