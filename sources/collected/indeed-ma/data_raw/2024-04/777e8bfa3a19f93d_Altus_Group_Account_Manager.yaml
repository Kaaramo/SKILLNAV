  Unlock your Altus Experience!

  If you’re looking to advance your career in data analytics, expertise, and technology for the rapidly growing global CRE market, there’s no better place than Altus Group. At Altus, our work is purposeful. Every day, our employees drive impact, innovate, and shape the global commercial real estate (CRE) and PropTech industry.

  Our people-centric culture empowers you to deliver in a high trust, high performance culture, surrounded by an inclusive team that’s collaborating to modernize our industry. We invest in our people with training and growth opportunities designed to propel you further in your career while providing a flexible and progressive workplace that reflects our values and teams.

  Résumé de travail:

  Sous la responsabilité du Manager, l'Associate Data Analyst est au sein de notre équipe du Maroc, et prend en charge le soutien à notre clientèle sur nos solutions Saas (Dette propre, dette garantie, prospective et fiscalité) ainsi que de nos prestations de conseil et d'ingénierie financière auprès de nos clients.

  Responsabilités principales:

  Intégration et suivi des contrats d'emprunt, swap, options et garanties clients.
  Analyse minutieuse des informations financières pour garantir l'exactitude des données.
  Mise à jour régulière des informations financières et gestion des modifications de contrat.
  Gestion proactive des dossiers clients pour répondre à leurs besoins de manière efficace.
  Prévision financière pour anticiper les besoins futurs des clients et recommander des solutions adaptées.
  Collaboration étroite avec l'équipe Customer Success pour garantir la satisfaction et la fidélité des clients.
  Respect des normes et procédures établies pour maintenir un haut niveau de qualité de service.
  Contribution à l'amélioration continue des processus et des pratiques pour optimiser l'efficacité opérationnelle.

  Compétences clés:

  De formation supérieure en finance, ou dans un domaine relatif - nous recherchons des candidatures de personnes récemment diplômées.
  Maîtrise des concepts financiers et des outils de gestion de la dette.
  Compétence avérée en analyse financière pour interpréter les données complexes.
  Capacité à travailler efficacement avec de grands ensembles de données tout en maintenant la précision.
  Excellentes compétences en communication pour interagir avec les clients et les collègues.
  Sens aigu de l'organisation et capacité à gérer plusieurs tâches simultanément.
  Esprit d'équipe et capacité à collaborer avec des départements multidisciplinaires.
  Orienté client et axé sur la satisfaction, avec une capacité à fournir un service de haute qualité.
  Compétence dans l'utilisation des technologies financières et des logiciels spécialisés.

  What Altus Group offers:

  Rewarding performance: We are pleased to be able to provide employees competitive compensation, incentive and bonus plans, and a total rewards package that prioritizes their mental, physical and overall financial health.
  Growth and development: As a destination for top industry talent, we’re investing in you to meet the evolving needs of our clients and deliver on your professional goals. Our Altus Intelligence Academy offers over 150,000 hours of learning materials catering to diverse stages of an employee’s career journey.
  Flexible work model: We’re modernizing our employee programs to reflect the new world of work. Our Activity-Based Work model provides you with flexibility to align your work location to the work being performed - office for connecting and collaborating, and remote for focused work.

  Altus Group is committed to fostering an inclusive work environment where all clients and employees feel welcomed, accepted and valued. We provide an atmosphere free from barriers to promote diversity, equity, and inclusion, and encourage equal opportunities for all employees. We’re seeking candidates with diverse experiences and provide accessible candidate experiences throughout the selection process. If you need accommodation, please contact us at accessibility@altusgroup.com or +1 888 692 7487.

  We appreciate all applicants who take the time to apply to Altus Group. Please note that only those who are selected to move forward in the process will be contacted. Thank you.
