source_id: indeed-ma
source_name: Indeed Maroc — ma.indeed.com
source_url: https://ma.indeed.com/
country: MA
language: fr

# ─── Classification SKILLNAV ─────────────────────────────────────────────────
tier: T1
priority: true
category: job_board_maroc
mcp_tool: firecrawl  # production cible · sample fait avec playwright
collection_frequency: daily

# ─── Conformité (CLAUDE.md §N4) ──────────────────────────────────────────────
robots_txt_compliant: true
robots_txt_checked_at: 2026-05-14
robots_txt_excerpt: "Allow: / · Disallow: /cmp/* /applystart /api/* /alert"
tos_reviewed_at: 2026-05-14
rate_limit_seconds: 5
user_agent: "SkillnavBot/1.0 (Academic; M242 ENSA-Tetouan)"
personal_data_policy: stripped
entity_focus: morale_only

# ─── URL patterns ────────────────────────────────────────────────────────────
url_patterns:
  search: "https://ma.indeed.com/jobs?q={keyword}&l="
  detail: "https://ma.indeed.com/viewjob?jk={jk}"
  aggregator: "https://ma.indeed.com/q-{keyword}-emplois.html"
  jk_pattern: "^[a-f0-9]{16}$"  # hash 16 hex

# ─── Anti-bot ────────────────────────────────────────────────────────────────
anti_bot:
  curl_direct: blocked  # HTTP 403 + "Security Check"
  webfetch: blocked
  pagination_without_auth: blocked  # ?start=10 redirige vers secure.indeed.com/auth
  playwright_real_browser: works  # vrai navigateur passe le Security Check
  firecrawl_managed: probable_works  # à valider quand disponible

# ─── Sample sprint 1 — Phase 1 Live + Phase 2 Wayback ────────────────────────
sample_collected_at: 2026-05-14T21:35:00Z
