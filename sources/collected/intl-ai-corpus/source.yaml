source_id: intl-ai-corpus
source_name: Corpus Tech International — scraping multi-villes (USA + Europe + Inde)
source_url: https://builtin.com/jobs
country: multi  # US, GB, NL, DE, IN
language: en
tier: T1
priority: true
category: international_aggregator
mcp_tool: firecrawl
fallback_tool: playwright
collection_frequency: snapshot  # collecte par vagues mensuelles

robots_txt_compliant: yes
tos_reviewed_at: 2026-05-15
rate_limit_seconds: 5
user_agent: "SkillnavBot/1.0 (Academic; M242 ENSA-Tetouan)"
personal_data_policy: stripped
entity_focus: morale_only

# ─── Méthodologie de collecte ───────────────────────────────────────────────
collection_methodology:
  pipeline: |
    1. Scrape Built In listings (5 villes US+EU+IN) via Firecrawl + proxy
    2. Dedup (title, company) + spam filter
    3. Download HTML full (parallélisé)
    4. Extract YAML raw via JSON-LD + BeautifulSoup
    5. Enrichissement LLM (classification ai-first/ai-support/ml-first,
       skills catégorisés en 10 dimensions, responsibilities, use_cases)
  cities: [Los Angeles, New York, London, Amsterdam, Berlin, India]
  scrape_period: 2026-02 → 2026-04
  focus: AI Engineer (Q1 2026)

# ─── Volume produit ─────────────────────────────────────────────────────────
