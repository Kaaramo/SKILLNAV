reorganisation_log:
  date: 2026-05-15
  description: |
    Réorganisation des YAML (data_raw/ et data_structured/) par
    MOIS DE PUBLICATION (posted_date) au lieu de date de scrape.
    Script: _reorg_by_publication_month.py
    Vérification: 3 090 fichiers raw + 3 087 structured déplacés, ZERO perte.
  rationale: |
    L'organisation par mois de publication est plus pertinente analytiquement :
    - alignée avec l'axe Usage Mining (time-series d'émergence des skills)
    - indépendante de la date de scrape (artefact technique)
    - permet d'inférer la "fraîcheur" relative d'une fiche

# ─── Mapping data_raw → SKILLNAV ────────────────────────────────────────────
schema_mapping:
  data_raw_fields_used:
    - job_id          # → source_ref + part of job_id
    - title           # → title
    - company         # → company
    - location        # → location + inferred country
    - work_type       # → custom work_type
    - level           # → experience_level_text
    - company_size    # → custom company_size_raw
    - description     # → description (full text, source de vérité NER)
    - industries      # → custom industries
    - posted_date     # → posted_date
    - url             # → source_url
  data_structured_fields_used:
    - company.stage             # → custom company_stage
    - company.focus             # → custom company_focus
    - position.ai_type.type     # → custom ai_classification
    - position.ai_type.reasoning # → custom ai_classification_reasoning
    - position.responsibilities # → responsibilities
    - position.use_cases        # → custom use_cases
    - position.skills.languages # → languages_programming
    - position.skills.genai     # → tools_mentioned + flag genai_skills
    - position.skills.ml        # → frameworks_mentioned + flag ml_skills
    - position.skills.web       # → tools_mentioned
    - position.skills.databases # → tools_mentioned
    - position.skills.data      # → tools_mentioned
    - position.skills.cloud     # → tools_mentioned
    - position.skills.ops       # → tools_mentioned
    - position.skills.domains   # → domains_iaml (via mapping)
    - position.skills.other     # → skills_required
    - position.is_customer_facing # → custom
    - position.is_management    # → custom
