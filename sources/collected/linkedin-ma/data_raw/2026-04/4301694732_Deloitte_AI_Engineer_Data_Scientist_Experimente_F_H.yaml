description: 'Quel sera votre rôle dans la #TeamDeloitte ?Deloitte Extended Services, basé à Casablanca est une filiale à
  100% de Deloitte France et constitue un centre de responsabilité à part entière.En support de différentes member firmes,
  Deloitte Extended Services mobilise ses talents au service de clients de toutes tailles et de tous secteurs, couvrant une
  large palette d''offres : Audit et Risk Advisory, Consulting, juridique & fiscal et fonctions supports. Notre Delivery Center
  se positionne également comme un centre d''expertises en matière de nouvelles technologies au Maroc ainsi qu''au sein du
  Groupe Deloitte. Nos consultants et nos experts travaillent sur des projets de grande envergure, avec une diversité de missions
  et de secteurs à l’échelle internationale.Vous intégrez notre équipe Engineering, AI & Data en tant que Consultant expérimenté
  Data Scientist/AI Engineering pour intervenir sur des missions variées visant à accompagner nos clients dans les projets
  de transformation data et IA. A ce titre, vous occuperez les responsabilités suivantes :Compréhension approfondie des statistiques.Capacité
  à explorer, nettoyer et transformer les données.Construction et évaluation de modèles prédictifs.Solides bases en algorithmes
  pour l’optimisation des modèles.Expérience avec des frameworks de deep learning comme TensorFlow, PyTorch, ou Keras.Expérience
  avec les techniques de NLP & Computer VisionFamiliarité avec les services Cloud (AWS, GCP, Azure).Expérience avec les containers
  et systèmes de déploiement comme Docker et Kubernetes.Capacité à expliquer des concepts complexes à des parties prenantes
  non techniques.Compréhension des implications éthiques du développement AI.Protocole de sécurité des données et des algorithmes.Utilisation
  de bibliothèques de visualisation comme Matplotlib, Seaborn, ou Plotly.Présentation des résultats de l’analyse de manière
  claire et compréhensible.Et si c’était vous ?Vous êtes titulaire d’un Bac+5 d''une école d''ingénieurs ou de commerce avec
  une spécialisation en DATA (BI, Big data, Data Science…) et bénéficiez d’une expérience de 2 ans minimum dans le développement
  Big Data, Connaissance de l''architecture des modèles, de leur optimisation et de leur mise en production.Connaissance des
  techniques de machine learning telles que régressions, arbres de décision, réseaux de neurones, etc.Expérience avec Python
  pour l''analyse de données.Utilisation d''outils comme Pandas, NumPy, et autres bibliothèques de manipulation de données.Maîtrise
  de langages comme Python, R, Java, Scala ou C++.#ALLIN?: tous les candidats ont leur place chez Deloitte sans aucune distinction,
  nous croyons en un environnement inclusif.'
