  donnéesCo-définir les règles de gestion métier et les règles de qualité des données financièresParticiper à la validation
  des indicateurs et rapports Power BIAssurer le suivi des évolutions et correctionsAnimation et coordination Finance / ITAnimer
  les ateliers de cadrage et de validation avec les équipes Finance (contrôle de gestion, comptabilité)Être l’interface entre
  les directions financières et les équipes Data / ITAccompagner la conduite du changement autour des nouveaux reportingCompétences
