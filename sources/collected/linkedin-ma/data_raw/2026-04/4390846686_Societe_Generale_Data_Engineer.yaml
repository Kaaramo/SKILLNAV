description: 'ResponsibilitiesLes Fast IT Data Engineers contribuent à des projets réglementaires et de transformation digitale
  à haute valeur ajoutée pour la banque d’investissement, comme la FRTB (SA-RRAO …) ou d’autres programmes stratégiques (VRP,
  Shannon, ...). En s’appuyant sur une plate-forme Python & Big Data, nous faisons à la fois le design de ces solutions avec
  une très grande proximité au métier (risques, trading, direction financière), et leur implémentation rapide. Les données
  manipulées par l’équipe sont très diverses et souvent composées pour des analyses sous diverses aspects : sensitivités,
  Notionals, Expected Shortfall, VaR/SVAR/ES & Stress Tests, market data, caractéristiques de produits, etc. ; sur toutes
  les classes d’actif classiques. Notre mission est de participer à ces outils nouvelle génération qui allient un savoir-faire
  à la fois IT et Finance de marché.Concrètement, vous serez amené(e) à :Bâtir et consolider une expertise double en Python/Big
  Data et Finance de marché.Grâce à cette base, livrer des solutions avec un time-to-market réduit en s''attachant à simplifier
  les sujets (souvent complexes) et en bénéficiant de la proximité du métier.Interagir au sein d''une équipe à taille humaine
  pour des projets à portée internationale et multi-compétences.Être en fer de lance avec une très forte valeur ajoutée (notamment
  par le caractère transversal de la plupart des sujets)Profile requiredCurieux(se), autonome, avec une forte capacité de
  problem solvingBon contact, sens du serviceExpertise technique solide en développement Python, Airflow , pySpark ,Culture
  DevOps et Agile : CI/CD, automatisation, pratiques de codage et de test, forte orientation production et fiabilité.Concepts
  de finance de marché : produits, métriques de risque sera un plusFluent in EnglishBusiness insightCréée en 2014, SG ATS
