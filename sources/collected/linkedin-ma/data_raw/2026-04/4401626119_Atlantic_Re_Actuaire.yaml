  majoritaire à hauteur de 94 %.Depuis son siège au Casablanca Finance City, Atlantic Re est présente sur plus de 70 marchés
  en Afrique, au Moyen-Orient et en Asie. La société accompagne plus de 500 clients en leur offrant une expertise technique
  pointue et des solutions sur mesure.En 2024, Atlantic Re a confirmé la solidité de son modèle et son positionnement stratégique
  avec une performance technique et financière remarquables : un chiffre d’affaires de 3 880 MMAD, un résultat net de 437
  MMAD et un ROE de 14,89 %.Fidèle à son engagement envers les marchés locaux, la présence d’Atlantic Re sur le continent
