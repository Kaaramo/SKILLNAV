  de partenaire clé dans la résilience et la transformation des économies africaines.Atlantic Re innove au quotidien et emploie
  tout son savoir-faire dans le déploiement de son offre de produits et services afin de créer de la valeur ajoutée pour ses
  clients et partenaires et le développement de l’industrie de l’assurance et de la réassurance.Dans le cadre du renforcement
