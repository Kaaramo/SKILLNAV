description: 'A PROPOS DE FORVIS MAZARSForvis Mazars Global Limited est un réseau mondial de référence de services professionnels.
  Opérant sous une marque unique dans le monde entier, le réseau compte deux membres seulement : Forvis Mazars, LLP aux Etats-Unis,
  et Forvis Mazars Group SC, un partnership international intégré opérant dans plus de 100 pays et territoires. Les deux membres
  du réseau partagent un même engagement : offrir à chaque client une expérience inégalée, en fournissant des services d’audit,
  de fiscalité et de conseil, partout dans le monde. Cette vision stratégique commune doit permettre à nos clients et nos
  collaborateurs, mais aussi, plus largement, à notre secteur d’activité et à nos communautés, de continuer à se développer.Au
  Maroc, le Cabinet figure parmi les cabinets leaders de l’audit et du conseil. Seize Associés, fédèrent plus de 230 collaborateurs.
  Tous optent pour des méthodes de travail harmonisées afin d’atteindre la même qualité des prestations. L’excellence est
  notre objectif.MISSIONAu sein de la BU Actuariat, vous interviendrez dans des missions variées :Travaux d’évaluation des
  engagements sociaux (retraite, indemnités de fin de carrière),Support à la production actuarielle pour les clients assureurs
  (calculs techniques, réserves),Participation à des missions d’audit (revue actuarielle dans le cadre du CAC),Veille technique
  et recherche sur des problématiques actuarielles.Vous serez formé(e) aux méthodologies internes, aux normes comptables (IFRS,
  normes marocaines) et aux outils techniques utilisés dans le cadre de vos missions.L’environnement dynamique de Forvis Mazars
  vous offrira des perspectives d’évolution rapide, ainsi qu’une exposition internationale, avec des déplacements potentiels
  à l’étranger selon la localisation des missions.PROFILDiplômé(e) Ingénieur Actuaire (INSEA, FST ou équivalent),Une première
  expérience (stage ou poste junior) en cabinet de conseil, d’audit ou en compagnie d’assurance est un atout,Bonne maîtrise
  des fondamentaux en mathématiques financières, assurance et évaluation des engagements sociaux,Maîtrise d’Excel, R ou Python
  appréciée,Esprit d’équipe, rigueur et appétence pour l’apprentissage,Bon niveau en français, l’anglais est un plus.Merci
  d’adresser votre candidature (référence du poste + CV) par e-mail à l’adresse suivante : RH.ma@forvismazars.com'
