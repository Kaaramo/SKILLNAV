  pour les plus grandes organisations et participer à la construction d’un monde plus durable et inclusif.Votre missionAu
  sein de nos équipes projet, vous participerez à la conception et à la mise en œuvre de solutions data à fort impact métier,
  dans des environnements à forts volumes et enjeux de performance. Vous intégrerez une équipe pluridisciplinaire, organisée
  en mode Agile, intervenant sur des projets stratégiques liés à la valorisation, la fiabilité et l’industrialisation de la
  donnée.En tant que Data Engineer Senior, vous interviendrez sur des missions variées telles que :Concevoir, développer et
  maintenir des pipelines de données robustes et performants pour la transformation et la valorisation de la donnéeStructurer
  et orchestrer les workflows data à l’aide de DBT, en garantissant la qualité, la fiabilité et la traçabilité des donnéesExploiter
  et optimiser de grands volumes de données via SQL avancé et BigQueryTraiter des flux batch et temps réel (Pub/Sub) et transformer
  des payloads complexes (JSON, Avro, Protobuf) en données exploitablesIndustrialiser les traitements data via CI/CD, Docker
  et des environnements CloudTravailler en collaboration étroite avec les équipes produit et métier pour produire des insights
  à forte valeur ajoutéeVeiller à l’optimisation des coûts, performances et standards de Data QualityVotre profilBac+5 en
  informatique ou équivalent, avec une expérience senior en Data EngineeringExcellente maîtrise de DBT, SQL avancé et des
  environnements Cloud (GCP)Solide expérience sur BigQuery, les pipelines data et les architectures orientées donnéesBonne
  compréhension des flux temps réel et de la transformation de données issues d’APIs ou WebAppsMaîtrise des outils d’industrialisation
  (Git, GitLab CI/CD, Docker, Linux)À l’aise dans un environnement Agile (Scrum) et collaboratifRigueur, autonomie, sens du
  détail et fort engagement sur la qualité des donnéesCuriosité technique et capacité à évoluer dans un écosystème Cloud en
  constante évolutionQuelques raisons de nous rejoindreQualité de vie au travail : Possibilité de télétravail au Maroc ainsi
  qu’a l’international et autonomie dans l’organisation de votre quotidien, missions hybrides selon vos préférences.Apprentissage
