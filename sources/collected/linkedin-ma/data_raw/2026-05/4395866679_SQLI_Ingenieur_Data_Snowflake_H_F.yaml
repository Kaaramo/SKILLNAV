  ainsi que des expériences engageantes en combinant technologies de pointe, méthodologies éprouvées et expertise technologique
  approfondie.Afin de renforcer nos équipes (2200 personnes, réparties dans 12 pays), nous recrutons des collaborateurs passionnés
  et qui partagent nos valeurs : "Creative spirit, Commitment, Forward thinking."Description du poste : En tant qu''ingénieur
  Data Snowflake, vous aurez comme missions la conception, de la mise en œuvre et de l''optimisation de solutions de gestion
  de données sur la plateforme Snowflake, en collaboration avec les équipes techniques et métiers.Vos missions principales
  seront : Participer aux ateliers d’analyse des besoins avec les équipes métiers (Finance, Ventes, Achats, etc.).Proposer
  et concevoir des architectures techniques adaptées, en mettant l’accent sur la fiabilité et la performance.Développer et
  maintenir les flux de données, notamment dans le contexte de la migration vers Snowflake.Optimiser la performance des applications
  existantes et assurer une documentation complète.Profil recherché: Bac +5 en informatique, ingénierie des données, ou domaine
  similaire.Minimum de 4 années d’expérience dans un poste similaire, avec une expérience spécifique sur Snowflake.Compétences
