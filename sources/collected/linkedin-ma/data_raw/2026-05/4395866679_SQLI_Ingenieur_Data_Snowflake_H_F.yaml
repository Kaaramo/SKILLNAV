  collaborer avec des équipes transverses.Anglais courant indispensable (environnement international, échanges fréquents à
  l’écrit et à l’oral).Compétences comportementales :Autonomie et capacité à travailler de manière indépendante.Bonne capacité
  de communication et esprit collaboratif.Rigueur et sens du détail dans la gestion des données et des processus.Forte capacité
  à résoudre des problèmes complexes et à innover dans l’optimisation des systèmes.Adaptabilité et curiosité pour apprendre
  les nouvelles technologies et les bonnes pratiques du secteur.Pourquoi rejoindre notre équipe ?Un environnement dynamique
  et innovant, au sein d’une équipe passionnée par les technologies de données.La possibilité de travailler sur des projets
  d’envergure, à la pointe des technologies cloud et Big Data.Des opportunités d’évolution et de formation continue pour développer
