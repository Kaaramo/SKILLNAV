  futur. Rejoignez-nous pour redéfinir les limites de ce qui est possible, contribuer à libérer la valeur de la technologie
  pour les plus grandes organisations et participer à la construction d’un monde plus durable et inclusif.Votre missionAu
  sein de nos équipes projet, vous contribuerez à la mise en œuvre de solutions de Business Intelligence pour des clients
  grands comptes dans les secteurs banque, assurance, énergie et industrie. Vous intégrerez une équipe pluridisciplinaire,
  organisée en mode Agile, et intervenant sur des projets à fort impact métier.En tant que Consultante / Consultant Power
  BI, vous interviendrez dans des missions variées telles que :Concevoir et développer des rapports et tableaux de bord interactifs
  avec Power BI.Modéliser les données et optimiser les performances des visualisations.Intégrer et transformer des sources
  de données hétérogènes (SQL, Excel, Azure, etc.).Participer à la définition des indicateurs clés de performance (KPI) en
  collaboration avec les équipes métier.Mettre en œuvre les bonnes pratiques de gouvernance BI et de sécurité des données.Contribuer
  à l’automatisation des processus de reporting et à l’amélioration continue des solutions BI.Encadrer techniquement les profils
  juniors et participer à la veille technologique autour des outils BI.Votre profilDiplômé(e) d’un Bac+5 en informatique,
  statistiques ou équivalent.Expérience confirmée (≥ 5 ans) sur un poste similaire.Maîtrise de Power BI, DAX, Power Query
  et des environnements cloud (Azure, AWS ou GCP).Bonne connaissance des bases de données relationnelles et du langage SQL.Capacité
  à comprendre les besoins métier et à les traduire en solutions BI efficaces.Sens de l’analyse, autonomie, rigueur et esprit
  d’équipe.Une certification Power BI ou cloud est un plus.Quelques raisons de nous rejoindreQualité de vie au travail : Possibilité
  de télétravail au Maroc ainsi qu’a l’international et autonomie dans l’organisation de votre quotidien, missions hybrides
  selon vos préférences.Apprentissage en continu : accédez aux formations et certifications dédiées à votre techno, accompagnement
  personnalisé et parcours d’intégration structuré.Projets variés et à fort impact : intervenez auprès de grands comptés dans
  des secteurs diversifiés avec des enjeux métiers et technologiques stimulants. Écosystème d’expertise : bénéficiez d’un
  accompagnement technique personnalisé et d’une intégration active dans nos communautés métiers.Nos engagements et prioritésLe
  groupe Capgemini encourage une culture inclusive dans un cadre multiculturel et handi-accueillant. En nous rejoignant, vous
