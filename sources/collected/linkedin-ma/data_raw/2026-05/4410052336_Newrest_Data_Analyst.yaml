description: 'Rattaché au Directeur des Systèmes d’information, Le Data Analyst intervient sur les applications métiers et
  les données associées.Il participe à des projets applicatifs et data pour des clients internes et externes, en collaboration
  avec des prestataires, dans le respect des standards groupe de sécurité et de gouvernance IT.Ces Responsabilités Principales
  Sont Assurer le support applicatif, l’exploitation et la fiabilité des données, et contribuer aux projets IT, tout en garantissant
  la conformité aux règles de sécurité et de gouvernance du groupe Newrest. Assurer le support applicatif et traiter les incidents,
  analyser les anomalies applicatives et assurer leur résolution ou leur escalade. Garantir la qualité et la fiabilité des
  données : réaliser des extractions, contrôles et analyses simples afin d’assurer la cohérence des données. Produire et maintenir
  les reportings et tableaux de bord : concevoir des indicateurs métiers (KPI) et assurer leur mise à jour pour le suivi des
  activités. Gérer et suivre les flux de données inter-applicatifs : superviser les échanges de données (ETL, API, formats
  CSV/XML/JSON) et traiter les erreurs ou rejets. Collaborer avec les équipes internes, clients et prestataires pour assurer
  le bon fonctionnement des applications et des solutions data. Appliquer les règles de sécurité et de gouvernance IT du groupe
  et veiller à la conformité des procédures et livrables. Documenter les procédures et solutions techniques afin d’assurer
  la traçabilité et la continuité des opérations. De formation en systèmes d’information, data / informatique ou diplôme de
  l’enseignement supérieur capitalisant sur une expérience professionnelle. Maîtrise des outils d’analyse et de reporting
  (Power BI, Power Platform, SharePoint) Compréhension des flux de données (ETL, API, formats CSV/XML/JSONa Propos De NewrestHumilité,
  simplicité, efficience, et sens des responsabilités, telles sont les valeurs de Newrest. Fort de ses 4700 collaborateurs
  présents dans tout le royaume, acteur majeur du catering aérien, Newrest est le seul opérateur à intervenir sur l’ensemble
  des secteurs : catering aérien, restauration collective, base-vies, retail et facility management.'
