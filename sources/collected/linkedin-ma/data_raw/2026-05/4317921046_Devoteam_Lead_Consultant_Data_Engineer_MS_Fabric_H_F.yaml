  la manipulation et l’automatisation des données. Compréhension des concepts de modélisation dimensionnelle (modèle en étoile).
  Familiarité avec les services Azure Data : Data Lake Storage, Synapse Analytics, SQL Database. Excellentes capacités d’analyse,
