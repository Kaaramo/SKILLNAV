description: 'ResponsibilitiesVous serez basé(e) à Casablanca, au sein de SG Africa Technologies & Services (SG ATS), et rejoindrez
  le département BTO / ORM (Operational Risk Management).Au sein d’ORM, l’équipe RMI – Risk & Management Information est en
  charge de la production, de l’analyse et du pilotage des reportings et tableaux de bord des Key Risk Indicators (KRIs) relatifs
  au risque opérationnel des métiers de Sales & Trading, à destination de la première ligne de défense du département MARK.Dans
  un contexte international, vous travaillerez en interaction étroite avec les équipes ORM basées en Europe (Paris, Londres),
  en Asie et dans les Amériques , ainsi qu’avec les équipes IT et métier. Ce poste occupe une position clé au sein de l’équipe
  RMI, avec un rôle central dans la gouvernance, la coordination transverse et la sécurisation de la continuité opérationnelle.Vos
  missions:Production & Expertise RMI / KRI: Concevoir, développer et maintenir des dashboards et reportings KRI. Analyser
  la qualité des données et investiguer les anomalies. Proposer des améliorations continues sur les indicateurs et méthodes.Gestion
  de Projet & Coordination: Collecter et formaliser les besoins métiers. Piloter les projets de bout en bout et suivre la
  roadmap.Gouvernance & Comités: Préparer et contribuer aux supports de comités et reportings management. Suivre les décisions
  et plans d’actions.Automatisation & Amélioration Continue: Automatiser, standardiser et documenter les processus.Profile
  required Bac+5 (école d’ingénieurs, université ou équivalent). Idéalement, un minimum de 5 ans d’expérience en reporting
  réglementaire et/ou en Risk management, avec une forte dimension data analysis. Expérience en coordination ou rôle de référent.
  Au regard du contexte international, un Anglais courant est indispensable.Compétences requisesTechniques: Python (pandas,
  numpy, automatisation de reporting) SQL (requêtes complexes, optimisation, contrôle de qualité des données) Power BI (modélisation
  de données, DAX, création de dashboards dynamiques, RLS...) Excel avancé (VBA apprécié, Power Query, Power Pivot)Fonctionnelles
  : Gestion et gouvernance des données Data visualisation orientée décisionnel et management Capacité à traduire les besoins
  métiers en solutions data Gestion de projets transverses Automatisation et industrialisation des reportingsTransverses :
  Rigueur analytique et sens du détail Capacité de communication avec des interlocuteurs IT, risk et métier Autonomie, esprit
  de synthèse et orientation résultatsBusiness insightFiliale du Groupe Société Générale, Société Générale Africa Technologies
  and Services (SG ATS) a été créée en 2014 dans le but de fournir des solutions agiles et efficaces aux salles des marchés
  de la banque en Europe (principalement à Paris et Londres) afin de les aider à se développer et à répondre aux exigences
  de plus en plus fortes imposées par les différentes législations bancaires internationales.Forte de son succès, SG ATS ambitionne
  de devenir un centre multi-services, toujours en fournissant des prestations à forte valeur ajoutée à différentes lignes
  de métiers du Groupe (en Europe principalement mais également aux Etats-Unis et en Asie) sur des activités de marchés, mais
  également à la direction des risques, la direction financière, la direction de la conformité et à d’autres directions centrales.Sacrée
  « Meilleur Employeur 2025 – Maroc » et ayant obtenu un certificat d’excellence pour le respect des principes d’égalité Femmes-Hommes
  en 2021, SG ATS est une structure jeune et dynamique qui positionne le capital humain au centre de son développement. SG
  ATS souhaite donc s’entourer de talents qui participeront activement à la réussite de l’entreprise tout en évoluant dans
  un environnement international propice au développement de compétences et d’expertises de niche.« Les informations recueillies
