description: Avec son modèle de banque universelle, sa dimension panafricaine, la complémentarité de ses métiers et ses expertises
  solides, le groupe Attijariwafa bank est un acteur de référence du secteur financier au Maroc et en Afrique.Attijariwafa
  bank a su, depuis plus d’un siècle, se réinventer en diversifiant ses métiers, en renouvelant ses offres et en adaptant
  ses organisations, pour répondre à son ambition de devenir la banque relationnelle de référence.Le groupe Attijariwafa Bank
  accompagne aujourd’hui 12 millions de clients particuliers, professionnels, entreprises et institutionnels et mobilise 20.900
  collaborateurs dans 26 pays en Afrique, en Europe et au Moyen-Orient.Dans le cadre du renforcement de notre dispositif d’acquisition
  digitale, nous recrutons un(e) "Digital Data Analyst", pour mesurer, analyser et valoriser la performance des dispositifs
  digitaux, en fournissant des analyses fiables permettant d’optimiser les investissements média.A ce titre, vous êtes en
  charge de :Analyser la performance des campagnes Paid Media, des parcours digitaux et des conversions, et en mesurer l’impact
  sur le ROIExploiter les outils de tracking et d’attribution (GA4, AppsFlyer, dashboards…) pour piloter la performanceCollecter,
  structurer et fiabiliser les données d’acquisitionProduire des reportings réguliers et des dashboards de pilotage à destination
  des équipes internesFormuler des recommandations data-driven pour optimiser les campagnes et les parcours utilisateursSuivre
  l’évolution des méthodologies et outils data (tracking, attribution, RGPD, sécurité des données)Contribuer aux projets d’amélioration
  continue et de transformation de la performance digitaleProfil Recherché :Diplômé(e) d'un Bac+5 en École de commerce ou
  ingénierie, data, statistiques ou équivalent,Vous justifiez de 5 à 10 ans d’expérience en analyse de performance digitale
  / marketing analytics,Maîtrise des outils de tracking et d’analyse (GA4, outils d’attribution, Excel avancé, outils BI…),Solide
  capacité d’analyse et culture orientée résultats,Aisance relationnelle et capacité à travailler en transverses,Analyse de
  données & performance marketing,Gestion et structuration de la data,Capacité de synthèse et restitution claire,Sens de l’innovation
  et amélioration continue.Pourquoi nous rejoindre ?Intégrer un Groupe leader sur le marché financier tourné vers l’humain
  et l’innovation et certifié Top Employeur pour 4 années consécutives.Bénéficiez d’un environnement de travail stimulant
  avec nombreuses opportunités de développement professionnel.Profitez d’avantages compétitifs (rémunération attractive, formation
  continue, etc).Envoyez-nous votre CV, nous sommes impatients de découvrir votre profil !
