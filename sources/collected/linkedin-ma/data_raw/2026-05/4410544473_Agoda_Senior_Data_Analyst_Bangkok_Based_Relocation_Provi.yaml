description: 'About AgodaAt Agoda, we bridge the world through travel. Our story began in 2005, when two lifelong friends
  and entrepreneurs, driven by their passion for travel, launched Agoda to make it easier for everyone to explore the world.Today,
  we are part of Booking Holdings [NASDAQ: BKNG], with a diverse team of over 7,000 people from 90 countries, working together
  in offices around the globe. Every day, we connect people to destinations and experiences, with our great deals across our
  millions of hotels and holiday properties, flights, and experiences worldwide.No two days are the same at Agoda. Data and
  technology are at the heart of our culture, fueling our curiosity and innovation. If you’re ready to begin your best journey
  and help build travel for the world, join us.Get to know our team: The Performance Marketing Team of Agoda is a world leader
  in online marketing. This department is highly data-driven and focused on developing at-scale marketing programs that improve
  the lifetime value of Agoda customers through measurable marketing programs and channels. The team is a blend of the best
  analysts, marketing strategists, and data scientists in the world. The marketing leadership at Agoda has deep experience
  in data science, product, strategy, and other marketing fields and has built an organization that thrives on data, creative
  ideas, and technology. The Performance Marketing Team also fosters a great learning environment. You will be able to learn
  and grow by working closely with experts from a variety of backgrounds from all over the world.Due to continued expansion,
  there are multiple analyst roles within the marketing team across different marketing channels. While the scope will vary
  depending on these channels, here are some examples:Experimentation and optimizing campaign performance: Experiment with
  ads/campaign structures and bidding& pricing strategies on partners such as Google, Bing, TripAdvisor, Trivago, and other
  search engines. Adapt to new product features and roll out changes from successful tests.Modeling: Analyze vast amounts
  of data generated by experiments, develop predictive models using data science techniques (e.g. understanding the impact
  on bookings from large-scale TV campaigns or demand elasticity from pricing optimization), and liaise with product teams
  on an implementation roadmapReporting, analysis, and insights: Building dashboards to track performance, derive insights,
  understand growth levers, and communicate recommendations via presentations to stakeholdersWhat you’ll Need to Succeed:
  Bachelor’s degree or higher from top university in a quantitative subject e.g. computer science, mathematics, engineering
  business, science, or relevant field of study4+ years experience in data crunching from top-tier consulting, investment
  banking, private equity or strategy/business role for a fast-growing global tech companyExperience in one or more data analysis
  packages or databases, e.g. SQL, SAS, R, SPSS, Python, VBA and visualization tools, e.g. Tableau, Power BI, etc.Excellent
  verbal and written communication skills in EnglishAbility to move fast and be efficient, making decisions on objective data
  evidence Innate desire to take ownership, make an impact and influence outcomesExcellent organizational skills, attention
  to detail and ability to work independentlyIt’s great if you have: Experience in digital marketing or e-commerceExperience
