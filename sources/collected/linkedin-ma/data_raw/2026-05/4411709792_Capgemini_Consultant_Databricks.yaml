description: 'Choisir Capgemini, c’est choisir une entreprise où vous serez en mesure de façonner votre carrière selon vos
  aspirations. Avec le soutien et l''inspiration d''une communauté d’experts dans le monde entier, vous pourrez réécrire votre
  futur. Rejoignez-nous pour redéfinir les limites de ce qui est possible, contribuer à libérer la valeur de la technologie
  pour les plus grandes organisations et participer à la construction d’un monde plus durable et inclusif.Votre mission :
  Au sein de nos équipes projet, vous contribuerez au développement de solutions digitales innovantes pour des clients grands
  comptes dans les secteurs banque, assurance, énergie et industrie. Vous intégrerez une équipe pluridisciplinaire, organisée
  en mode Agile, et intervenant sur des projets à fort impact métier.En tant qu’Ingénieure/Ingénieur Databricks, vous interviendrez
  dans des missions variées telles que :Concevoir et développer des pipelines de données performants et scalables sur Databricks.Exploiter
  les fonctionnalités avancées de Apache Spark via PySpark pour le traitement de données massives.Participer à la modélisation
  des données, à l’optimisation des performances et à la mise en place de bonnes pratiques.Collaborer avec les équipes Data
  Science, BI et métier pour répondre aux besoins business.Intégrer les solutions dans des environnements CI/CD, avec des
  outils comme Git, Azure DevOps, Terraform.Encadrer techniquement les profils juniors et contribuer à la veille technologique.Votre
  profil :Diplômé(e) d’un Bac+5 en informatique ou équivalent.Expérience confirmée (≥ 5 ans) sur un poste similaire.Expérience
  confirmée en ingénierie de données avec Databricks.Maîtrise de PySpark, SQL, et des environnements cloud (Azure, AWS ou
  GCP).Connaissance des outils d’orchestration (Airflow, Azure Data Factory, etc.).Sens de l’analyse, autonomie, rigueur et
  capacité à travailler en équipe.Une certification Databricks ou cloud est un plus.Quelques raisons de nous rejoindre :Qualité
  de vie au travail : Possibilité de télétravail au Maroc ainsi qu’a l’international et autonomie dans l’organisation de votre
  quotidien, missions hybrides selon vos préférences.Apprentissage en continu : accédez aux formations et certifications dédiées
  à votre techno, accompagnement personnalisé et parcours d’intégration structuré.Projets variés et à fort impact : intervenez
  auprès de grands comptés dans des secteurs diversifiés avec des enjeux métiers et technologiques stimulants. Écosystème
  d’expertise : bénéficiez d’un accompagnement technique personnalisé et d’une intégration active dans nos communautés métiers.Nos
  engagements et priorités :Le groupe Capgemini encourage une culture inclusive dans un cadre multiculturel et handi-accueillant.
  En nous rejoignant, vous intégrez un collectif qui valorise la diversité, développe le potentiel de ses talents, s’engage
  dans des initiatives solidaires avec ses partenaires, et se mobilise pour réduire son impact environnemental sur tous ses
  sites et auprès de ses clients.Capgemini est un leader mondial, responsable et multiculturel, regroupant près de 350 000
  personnes dans plus de 50 pays. Fort de 55 ans d’expérience, nous sommes un partenaire stratégique des entreprises pour
  la transformation de leurs activités en tirant profit de toute la puissance de la technologie et des innovations dans les
  domaines en perpétuelle évolution tels que le cloud, la data, l’Intelligence Artificielle, la connectivité, les logiciels,
  l’ingénierie digitale ou les plateformes.'
