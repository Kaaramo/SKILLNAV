  de toutes les forces de l''entreprise à la décarbonation de notre planète. L''objectif Net Zéro Émission 2050 de la COP21
  est au cœur de nos missions. C''est pourquoi nous investissons dans le Monde pour l''accélération de la transition énergétique
  (Hydrogène vert, Renouvelables, Nucléaire) et pour le déploiement des nouvelles mobilités (Électriques, Hydrogène vert,
  et Ferroviaires).Nous sommes convaincus que notre vision et nos missions créent de la valeur pour nos clients et nous permettent
  de contribuer aux grands enjeux sociétaux et environnementaux de notre planète.Dans une dynamique de développement de notre
  organisation, nous recherchons un(e) Data Analyst Purchasing passionné(e) par l''impact de la donnée sur la performance
  Achat et la transition énergétique.-----👀 Décrochez votre futur challenge : Data Analyst Purchasing (H/F) en CDILieu de
