description: 'Rejoignez COMECA : Accélérez la Transition Énergétique en tant que Data Analyst Purchasing !Notre cœur de métier,
  basé sur des solutions énergétiques innovantes et efficaces, continue de se renforcer grâce à une vision claire orientée
