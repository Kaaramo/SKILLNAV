description: 'About AgodaAt Agoda, we bridge the world through travel. Our story began in 2005, when two lifelong friends
  and entrepreneurs, driven by their passion for travel, launched Agoda to make it easier for everyone to explore the world.Today,
  we are part of Booking Holdings [NASDAQ: BKNG], with a diverse team of over 7,000 people from 90 countries, working together
  in offices around the globe. Every day, we connect people to destinations and experiences, with our great deals across our
  millions of hotels and holiday properties, flights, and experiences worldwide.No two days are the same at Agoda. Data and
  technology are at the heart of our culture, fueling our curiosity and innovation. If you’re ready to begin your best journey
  and help build travel for the world, join us.Key Areas of Focus:In this role, you’ll get to: Strategy: Conduct analyses
  to identify growth opportunities and prioritize investment areas in APAC for Strategic Partnerships team based on analytical
  insights, industry trends, and changing competitive landscape.Analytics: Leverage data & tools to analyze SP performance
  and identify appropriate levers to improve performance.Cross-functional projects: Work with different teams inside SP (B2B,
  White Label, Affiliates, Financial Institutions, different markets across APAC, etc.) and outside of SP (product, marketing,
  supply, finance, etc.) to drive initiatives.Performance management: Maintain and optimize a performance management system
  for the department, including a large team of account managersData & tools: Oversee SP data infrastructure to ensure data
  accuracy, completeness, and timeliness. Design, manage, and oversee the maintenance of data tools to support decision making.Performance
  reporting: Preparing updates on business performance, proposals, and recommendations to senior management.Pricing Experiments:
  Optimize pricing strategy and make decisions based on A/B experiments.What you’ll Need to Succeed: 4 years and above of
  experience with Consulting, Data Analytics, Strategy, Business Development, Business Intelligence, or other relevant fields
  Proven ability to leverage analytics and quantitative methods to break down ambiguous problems and come up with recommendations
