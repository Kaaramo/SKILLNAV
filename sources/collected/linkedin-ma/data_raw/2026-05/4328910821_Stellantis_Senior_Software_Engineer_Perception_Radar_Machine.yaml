description: We are looking for technology game changers to transform Stellantis into a software automotive company. Technology,
  software, and artificial intelligence are disrupting the automotive industry. Our new AI/Autonomous Driving division was
  created to build the most captivating experiences on the latest frontier of Automotive Technology.The TeamThe Perception
  and Fusion team within AI/AD is building the core functionalities to allow our vehicle to perceive the world around it and
  to make the right decision in every situation. We are looking for passionate, curious and entrepreneurial engineers to join
  our team to work in solving complex technical challenges in all Perception areas (Radar, Lidar, 3D Computer Vision, classification,
  semantic segmentation, early and late fusion, prediction, tracking, etc.), applying the latest state-of-the-art algorithms
  You will be working with a kind, dynamic and diverse team across the world.In This Role You Will Investigate and develop
  Radar perception and fusion both with traditional and ML approaches. Support the optimization and deployment of these models
  on the Stellantis vehicles. Support the Radar sensor engineering, analyzing and evaluating product performance with respect
  to the Stellantis perception requirements. Proactively support the DevOps and MLOps teams providing feedback and suggestions
  on how to improve our software pipeline. Proactively work cross functional to understand and solve the challenges related
  to Perception systems in Autonomous Driving. Profil Minimum Qualifications Technical maturity of a bachelor's degree in
  a quantitative field. 1+ years of experience with hands-on Radar perception and/or Radar/Camera fusion algorithms. 1+ years
  of experience in perception/robotics Machine Learning projects. 3+ years of experience with object-oriented programming
  (e.g., Python and/or C++) and with some of the most popular ML frameworks (e.g., TensorFlow, PyTorch, etc.). Advocate for
  software engineering good practices (e.g., test-driven development, version control, documentation). Passion for solving
  unstructured problems.Preferred Qualifications M.Sc. or Ph.D. in Robotics, Computer Vision, Computer Science, Machine Learning,
  or similar. Experience in multi-sensor perception and fusion, mobile robotics (e.g., ROS), 3D visualization, distributed
  systems, embedded systems for ADAS (Advanced Driver Assistance Systems), and mapping. Experience in implementing the latest
  Deep learning applied research to build Proof of Concept and prototypes.At Stellantis, we assess candidates based on qualifications,
  merit and business needs. We welcome applications from people of all gender identities, age, ethnicity, nationality, religion,
  sexual orientation and disability. Diverse teams will allow us to better meet the evolving needs of our customers and care
  for our future.
