description: About Phi PartnersPhi Partners has been a trusted capital markets consultancy for more than 20 years, providing
  quantitative and technology expertise across front office, pricing and risk. We support more than 80 financial institutions
  across the buy-side and sell-side through niche capabilities spanning quant, engineering, vendor platforms and cloud infrastructure.
  Our teams work on complex, real-world problems across models, analytics, applications, data and cloud infrastructure, within
  an international delivery organisation built around regional hubs and specialist centres of excellence.Phi Partners has
  nearshore Centres-of-Excellence which are specialised in respective ‘Lines of Business’ (LoBs). Our Casablanca Centre-of-Excellence,
  located in CFC, is the primary centre for our Quantitative Services team. Our Quant Services include quant model development,
  model integration and model validation. Consultants in this Line of Business have the opportunity to be mentored by well-known
  industry-leading Quants based in Casablanca and abroad, and work for a variety of top-tier clients including the world’s
  largest Investment Banks, Asset Management Companies, and market-leading Hedge Funds. We support organic talent growth in
  Morocco, as well as facilitate Quants, Quant Developers, IT Quants, Front Office Technologists & Engineers who have worked
  abroad to relocate to Casablanca.About The ProgrammeAs part of our partnerships with various clients, we are currently expanding
  our quant teams to keep pace with the rapid growth in this business. Our quant consultants gain exposure to a variety of
  projects across asset classes as well as coverage areas (such as front office, pricing & analytics, risk methodology, model
  validation and more), with each project typically taking 12 to 18 months. As a firm we engage in a wide range of quant services,
  including but not limited to:Quantitative and mathematical modelling for various departmentsModel integration into quant
  libraries as well as quant library upgrades / refactoringFront office quantitative development and engineering, including
  directly supporting the trading desksModel validation and documentation services including supporting our clients in engaging
  with regulatorsRoles & ResponsibilitiesOur projects will involve mathematical modelling as well as practical implementation
  of the models into sophisticated quant libraries.You will get the opportunity to work closely with fellow quant analysts,
  library quants, model developers, front office IT engineers and other stakeholders. On a day-to-day basis, a quant consultant
  in our Centre of Excellence will work on projects which involve:Working on mathematical models, going into theoretical design
  and documentation for financial products along with writing documentation for any new pricing & analytics modelsModel development
  within the existing quant library of our clientsClose collaboration with all the Quants, Quant Developers and Software Engineers
  within Front Office IT (including those from within Phi as well as those from the client’s team)Developing frameworks and
  architecture for implementing financial product models into the quantitative library in a robust and suitable manner for
  their intended purposesImplementing efficient algorithms to preprocess and manipulate large volumes of data, ensuring data
  integrity and consistencyWriting clean, well-documented, and efficient code in Python, C++, C#, Java or other coding languagesKey
  SkillsTo be successful as a Quant Analyst, the ideal candidate will bring the following skills:Educational qualifications
  in a highly numerate discipline such as applied mathematics, quantitative finance, physics, computer science, engineering
  or similar fields; Masters’ or above highly preferredFrench or Moroccan Grande École qualifications in Quantitative Finance,
  Financial Engineering or Actuarial/Applied Mathematics are desirable but not mandatoryExperience working as a Quantitative
  Analyst (including Internships/PFE) at an investment bank, hedge fund, specialist consulting firm or financial institution
  is advantageousGood programming skills in Python, C++, C# or JavaStrong consultancy and client services mindsetKeen interest
  to work with international stakeholdersGood documentation and communication skillsEnglish proficiency is a mustNext StepsThis
  is an excellent opportunity to establish yourself within a rapidly expanding consultancy firm in a high growth Quantitative
  Centre of Excellence led by recognised industry leaders, built on a foundation rooted in academic rigour and a culture of
  R&D. The right professional can grow their skills and abilities while continuing to actively contribute in a hands-on technical
  manner on challenging global quant projects.Graduates & Young Professionals are encouraged to apply but note that we may
  recommend an Internship/PFE/Graduate Program position if it is more appropriate.
