  de 3100 consultants ALTENiens en fin 2024. Avec plus de 90 recrutements par mois, ALTEN Maroc est désormais un acteur majeur
  de l’insertion professionnelle des ingénieurs. Nous accompagnons nos clients, leaders de l’Industrie dans leurs stratégies
  de développement dans les domaines de l’automobile, du ferroviaire, de l’IT, de la R&D et des Télécoms & Médias.Rejoindre
  ALTEN MAROC c''est bénéficier :Des parcours professionnels diversifiés avec des opportunités de carrière, une mobilité interne,
  sectorielle, géographique et métiers.Des formations certifiantes et diplômantes.Des événements réguliers pour combiner bien
  être et performance.Description du posteNous cherchons un(e) ingénieur(e) junior en Intelligence Artificielle, passionné(e)
  par la technologie et motivé(e) pour acquérir de nouvelles compétences. Vous participerez au développement et à l’optimisation
  de solutions d''IA pour divers projets innovants. Ce poste est idéal pour une personne souhaitant évoluer et se former dans
  le domaine de l''IA, avec une passion pour les défis techniques et un esprit curieux.Responsabilités :Assister au développement
  et à l''entraînement de modèles d''IA sous la supervision d’ingénieurs expérimentés.Participer à la collecte, préparation
