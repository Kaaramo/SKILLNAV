  leur performance et fiabilité.Documenter les étapes du projet et effectuer des rapports réguliers sur l’avancement.QualificationsFormation
  : Diplôme en ingénierie, informatique, mathématiques, ou dans un domaine connexe.Expérience : Min 1 an sur des projets en
  Intelligences artificielles.Compétences techniques requises :Bonne connaissance de la programmation, en particulier avec
  des langages comme Python.Familiarité de base avec les concepts d''apprentissage automatique (machine learning) et l''utilisation
  de frameworks IA (TensorFlow, PyTorch).Notions de manipulation de données avec des outils comme SQL ou pandas.Compétences
  supplémentaires souhaitées :Connaissance des bases de mathématiques et de statistiques (algèbre linéaire, probabilités).Notions
  sur le cloud computing (AWS, Google Cloud, Azure) et l’analyse de données (Tableau, Excel).Qualités personnelles recherchées
  :Esprit d’apprentissage et ouverture à recevoir des formations et du mentorat.Forte motivation pour évoluer dans un environnement
  technique et relever des défis.Bonne capacité de communication et esprit d''équipe.Sensibilité aux questions éthiques dans
  l’IA, avec une volonté d’apprendre les bonnes pratiques pour limiter les biais.'
