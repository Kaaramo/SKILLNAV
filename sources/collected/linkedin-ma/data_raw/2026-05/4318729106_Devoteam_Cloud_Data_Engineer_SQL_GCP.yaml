  Connaissance d’outils supplémentaires : Airflow, Snowflake, Redshift, Synapse. Expérience avec les environnements multi-cloud
  (GCP, AWS, Azure). Pratique des pipelines CI/CD. Aptitudes personnelles :Capacité à travailler en équipe et avec des clients
  français. Esprit analytique et sens du détail. Bonne communication en français (oral et écrit). Informations supplémentaireshttps://www.linkedin.com/company/devoteamhttps://twitter.com/devoteamhttps://www.facebook.com/devoteam'
