  pipelines de données complexes. Travailler sur des environnements Public Cloud (GCP, AWS, Azure). Exploiter et optimiser
  des outils comme :Google BigQuery (must have). Snowflake, Redshift, Synapse, SQL Server. Data Build Tool (DBT) (must have).
