description: 'Notre mission depuis 30 ans ? Être présent au bon moment !​Notre expertise ? Accompagner nos clients à capter
  l’attention de l’utilisateur et transformer cette interaction furtive en une interaction mémorable. C’est dans cette optique
  que nous accompagnons les entreprises dans la mise en œuvre, et le pilotage de dispositifs digitaux pour une expérience
  utilisateur réinventée.​La juste interaction, c’est quoi ? C’est capter notre attention au bon moment, au bon endroit et
  la convertir en envie et en confiance. Un équilibre subtil entre le trop et le trop peu. Entre le trop tôt et le trop tard.​Devenez
  SQLien et faites partie de cette grande aventure au sein d’une société à taille humaine, mais avec de grandes ambitions.
  Nous sommes plus de 2200 talents sur plus de 13 pays et 3 continents.​Notre culture ?​Oser et créer.​ Description du posteNous
  recherchons un Développeur Tableau passionné et expérimenté pour rejoindre notre équipe de Business Intelligence. Vous aurez
  la charge de la création, du développement et de l''optimisation des dashboards et rapports interactifs en utilisant Tableau,
  afin d’aider les équipes métiers à prendre des décisions basées sur des données fiables et pertinentes. En tant que membre
  clé de notre équipe, vous participerez à l''évolution de notre plateforme de données, en collaboration avec des data analysts,
  des data scientists et des chefs de projet.Missions :Conception et développement de dashboards : Concevoir et développer
  des tableaux de bord interactifs, des rapports et des visualisations percutantes sous Tableau, adaptés aux besoins des utilisateurs
  métiers. Analyse des besoins : Collaborer avec les équipes métiers pour comprendre leurs besoins en matière de reporting
  et de visualisation de données, et traduire ces besoins en solutions Tableau efficaces. Optimisation des performances :
  Optimiser les performances des tableaux de bord, des calculs et des sources de données afin de garantir une expérience utilisateur
  fluide. Gestion des sources de données : Préparer et intégrer des données provenant de différentes sources (bases de données,
  API, fichiers Excel, etc.) pour les rendre accessibles et exploitables sous Tableau. Automatisation et gestion des flux
  de données : Mettre en place des automatisations pour l’actualisation des données et garantir la cohérence des rapports.
  Support et formation : Apporter un support technique aux utilisateurs finaux, leur fournir des formations sur l’utilisation
  des dashboards Tableau et résoudre les problèmes techniques rencontrés. Veille technologique : Rester informé des nouvelles
  fonctionnalités et des meilleures pratiques liées à Tableau, et proposer des améliorations continues sur la plateforme.
  QualificationsProfil recherché :Formation : Bac +5 en informatique, Data Science, Business Intelligence ou domaine équivalent.
  Expérience : Minimum 3 ans d’expérience dans le développement de visualisations de données et de rapports sous Tableau.
  Compétences techniques :Maîtrise de Tableau Desktop et Tableau Server (création de visualisations, calculs, filtres, etc.).
  Expérience avec des bases de données SQL et capacité à concevoir des requêtes complexes pour alimenter Tableau. Connaissance
  des bonnes pratiques en matière de design de visualisations et de storytelling avec les données. Expérience avec Tableau
  Prep ou d''autres outils ETL est un plus. Connaissance des intégrations Tableau avec des systèmes externes (API, outils
  BI tiers). Compétence en gestion de versions avec Git ou d’autres outils similaires est un plus. Aptitudes personnelles
  :Esprit d’analyse et capacité à résoudre des problèmes complexes. Excellentes compétences en communication, à la fois techniques
  et non techniques, pour interagir avec les équipes métiers. Autonomie, organisation et gestion des priorités dans un environnement
  dynamique. Sens du détail, créativité et capacité à transformer des données brutes en insights visuels pertinents. Informations
  supplémentairesLe poste est ouvert pour les villes : Rabat ou Casablanca'
