description: 'About AgodaAt Agoda, we bridge the world through travel. Our story began in 2005, when two lifelong friends
  and entrepreneurs, driven by their passion for travel, launched Agoda to make it easier for everyone to explore the world.Today,
  we are part of Booking Holdings [NASDAQ: BKNG], with a diverse team of over 7,000 people from 90 countries, working together
  in offices around the globe. Every day, we connect people to destinations and experiences, with our great deals across our
  millions of hotels and holiday properties, flights, and experiences worldwide.No two days are the same at Agoda. Data and
  technology are at the heart of our culture, fueling our curiosity and innovation. If you’re ready to begin your best journey
  and help build travel for the world, join us.Overview:The Agoda Content department is currently looking for a curious and
  questioning self-starter and proactive analyst, who will help drive decision making with insights from content, marketing
  and partner performance data.You will get the opportunity to own analytical projects to direct our department’s focus, and
  prioritize our actions. By joining Agoda, you will become part of a truly international team, with leading experts of different
  backgrounds coming from 50+ countries around the world. This is a genuine opportunity to gain valuable experience in a challenging
  and cutting-edge tech environment. The ideal candidate would have a passion for high-converting content, great user-experience,
  data and analysis tools and methods. This position reports to the Associate Director of Content Operations, in Bangkok,
  Thailand.Main responsibilities:Understand Content goals and KPIs and be able to align reports and insights based on them.
