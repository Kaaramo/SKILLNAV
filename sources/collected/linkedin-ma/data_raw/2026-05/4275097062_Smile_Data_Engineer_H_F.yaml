description: 'SMILE est le leader du "sourire" au travail, mais aussi de l''intégration de solutions Open-Source. Enthousiastes,
  agiles et performants, notre vocation est de libérer le potentiel d''innovation des entreprises, à travers l''Open-Source
  !Nos Smiliens experts accompagnent les entreprises dans des domaines aussi variés que le Digital, les Business Apps, l''Embarqué
  & l''IoT et l''Infrastructure : 2000 collaborateurs présents dans 9 pays, avec 17 agences réparties en France et à l''international.
  Nos marques expertes : SensioLabs, Neopixl, Alter Way, UX-Republic, Creativestyle et Synotis.Nous sommes certifiés “Happy
  at Work” 2023 !😍Au sein de l''agence située à Casablanca, rejoignez une équipe dynamique de passionnés du monde Open Source,
  dans une ambiance à taille humaine.Nous cherchons un(e) Data Engineer qui peut nous aider à évaluer la qualité, l''exactitude
  et l''exhaustivité des sources de données et des produits numériques.Vos responsabilités : Concevoir, développer et maintenir
  des pipelines de données robustes et scalables. Intégrer et transformer des données issues de sources multiples (APIs, bases
  dedonnées, fichiers, systèmes tiers). Optimiser la performance et la qualité des flux de données (monitoring, logging,gestion
  des erreurs). Mettre en place des mécanismes de gestion de la qualité et de la sécurité des données. Participer à la conception
  de l’architecture Data (stockage, ingestion, transformation,restitution). Implémenter et administrer des solutions Cloud/Data
  Warehouse (Snowflake, AzureBlob Storage, etc.). Automatiser les workflows de données avec des orchestrateurs (Airflow, dbt,
  etc.). Travailler étroitement avec les Data Scientists et Analystes pour rendre les donnéesprêtes à l’analyse. Contribuer
  à l’intégration des modèles de Machine Learning et d’analyses avancéesdans les pipelines. Documenter et partager les bonnes
  pratiques d’ingénierie des données au sein del’équipe.Environnement technique:Langages & outils de traitement de données
  : Python, SQL (DBT), Spark, Bash.Orchestration & ETL : expérience avec Airflow ou outils similaires.Bases de données : maîtrise
  des systèmes relationnels et NoSQL.Cloud & Data Warehouse : expérience avec Snowflake, Azure (Blob Storage), ou équivalent.Visualisation
  : la maîtrise de Power BI est un plus.Maitrise des outils de CI/CD/GitConnaissances des environnements Cloud (AWS, Azure,
  GCP) est un atout.Bonne compréhension des architectures orientées données (Data Lake, Data Warehouse, Data Mesh).Qualifications
  :  Vous avez un Bac+5 en Data Science, Statistiques, Informatique ou un domaine similaire. Vous avez 2 ans d''expérience
  en analyse, gestion et/ou qualité de la donnée. Vous avez des excellentes capacités d’analyse et de résolution de problèmes.
  Vous avez une autonomie et capacité à travailler sur des projets complexes. Vous avez un esprit d’équipe et bonnes compétences
  en communication.Envoyez-nous vite votre CV, ce poste est pour vous !'
