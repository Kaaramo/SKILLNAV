description: AXA ASSURANCE MAROC recrute pour le compte de sa Direction Technique, Data et IA Afrique Atlantique un/une Data
  Scientist :Mission Du PosteLe Data Scientist a pour mission de développer des modèles et des algorithmes poussés (notamment
  Machine Learning) pour fournir des insights stratégiques basés sur les résultats obtenus dans le but de guider la prise
  de décision au sein de l'entreprise et de créer de la valeur business.Il travaille en étroite collaboration avec les équipes
  métiers pour comprendre leurs besoins, les équipes CTO/DSI pour mettre en place l’infrastructure et déployer les modèles
  ainsi que les Data Engineers pour l’implémentation des pipelines de données.Activités Du PosteLe Data Scientist exerce tout
  ou partie des activités suivantes :Collecte, exploration et préparation de données structurées et non structurées ;Conception,
  développement et mise en production de modèles analytiques, incluant le machine learning et l’intelligence artificielle
  générative (GenAI / LLM) ;Conception et optimisation de prompts (prompt engineering) et évaluation de la qualité, de la
  fiabilité et de la sécurité des résultats générés ;Analyse, interprétation et restitution des résultats des modèles afin
  de produire des recommandations actionnables pour les équipes métiers ;Collaboration avec les équipes métiers, Data et IT
  pour concevoir et intégrer des solutions IA adaptées aux besoins opérationnels ;Suivi de performance, amélioration continue
  des modèles et veille technologique sur les évolutions de l’IA et de la GenAICompétences RequisesMaîtrise avancée de Python,
  notamment pour l’analyse de données, le machine learning et l’IA générative ;Solides bases en statistiques, probabilités
  et mathématiques appliquées, au service de la modélisation et de l’interprétation des résultats ;Maîtrise des frameworks
  et bibliothèques de Machine Learning etDeep Learning (scikit-learn, PyTorch, TensorFlow) ;Expérience en intelligence artificielle
  générative (GenAI) et en exploitation de modèles de langage (LLM), incluant le prompt engineering ;Maîtrise de PySpark et
  des environnements distribués pour le traitement de grands volumes de données ;Excellente maîtrise de SQL et des bases de
  données relationnelles et analytiques ;Compétences avancées en préparation, nettoyage et transformation des données, sur
  des données structurées et non structurées ;Capacité à concevoir, évaluer et optimiser des modèles, incluant le suivi de
  performance, la robustesse et la dérive des modèles ;Notions d’industrialisation et de déploiement des modèles (pipelines,
  APIs, monitoring) ;Capacité à traduire des problématiques métiers complexes en solutions analytiques, et à communiquer clairement
  les résultats et recommandations.Profil RecherchéUne expérience de 3 ans minimum dans un poste similaireSi le descriptif
  correspond à votre profil et motivations professionnelles, merci de nous faire parvenir vos CV.Pourquoi rejoindre AXA Assurance
  Maroc ?AXA est un des leaders de l’assurance et de la gestion d’actifs à travers le monde.Nous aidons nos 108 millions de
  clients à traverser les petites et grandes difficultés de la vie.Accéder à des opportunités de développement professionnel
  et de formation continue pour favoriser votre croissance au sein de notre entreprise et enrichir votre panel de compétences.Evoluer
  dans une culture d'entreprise basée sur l’agilité, la performance individuelle et collective, la collaboration et l'éthique.Être
  collaborateur AXA Assurance Maroc, c’est rejoindre un environnement de travail inclusif et diversifié, où chaque individu
  est valorisé et a la possibilité de s'épanouir.Tous nos emplois sont ouverts aux personnes en situation d’handicap.
