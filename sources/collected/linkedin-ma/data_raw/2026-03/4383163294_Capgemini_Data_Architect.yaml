description: 'Choisir Capgemini, crest choisir une entreprise où vous serez en mesure de façonner votre carrière selon vos
  aspirations. Avec le soutien et l''inspiration d''une communauté d’experts dans le monde entier, vous pourrez réécrire votre
  futur. Rejoignez-nous pour redéfinir les limites de ce qui est possible, contribuer à libérer la valeur de la technologie
  pour les plus grandes organisations et participer à la construction d’un monde plus durable et inclusif.Votre missionAu
  sein de nos équipes projet, vous contribuerez à la mise en œuvre de solutions d’intégration de données pour des clients
  grands comptes dans les secteurs banque, assurance, énergie et industrie. Vous intégrerez une équipe pluridisciplinaire,
  organisée en mode Agile, et intervenant sur des projets à fort impact métier.En tant que Data Architect, vous interviendrez
  dans des missions variées telles que :Définir les architectures data (Data Lake, Data Warehouse, Data Mesh…) en fonction
  des besoins métier et techniques.Concevoir les modèles de données et les flux d’intégration dans des environnements cloud
  et hybrides.Garantir la cohérence, la sécurité et la performance des solutions data mises en œuvre.Collaborer avec les équipes
  Data Engineering, BI, Data Science et les architectes d’entreprise.Mettre en œuvre les bonnes pratiques de gouvernance des
  données, de qualité et de documentation.Participer à la sélection des technologies et outils adaptés aux projets.Encadrer
  techniquement les équipes et contribuer à la veille technologique autour des architectures data.Votre profilDiplômé(e) d’un
  Bac+5 en informatique ou équivalent.Expérience confirmée (≥ 7 ans) en architecture data ou ingénierie de données.Maîtrise
  des concepts d’architecture data, modélisation, gouvernance et sécurité.Bonne connaissance des environnements cloud (Azure,
  AWS, GCP) et des outils d’intégration et d’orchestration.Capacité à concevoir des solutions scalables, robustes et alignées
  avec les enjeux métier.Leadership, sens de l’analyse, rigueur et capacité à travailler en équipe.Une certification en architecture
  cloud ou data est un plus.Quelques raisons de nous rejoindreQualité de vie au travail : Possibilité de télétravail au Maroc
  ainsi qu’à l’international et autonomie dans l’organisation de votre quotidien, missions hybrides selon vos préférences.Apprentissage
  en continu : accédez aux formations et certifications dédiées à votre techno, accompagnement personnalisé et parcours d’intégration
  structuré.Projets variés et à fort impact : intervenez auprès de grands comptés dans des secteurs diversifiés avec des enjeux
  métiers et technologiques stimulants. Écosystème d’expertise : bénéficiez d’un accompagnement technique personnalisé et
  d’une intégration active dans nos communautés métiers.Nos Engagements Et PrioritésLe groupe Capgemini encourage une culture
  inclusive dans un cadre multiculturel et handi-accueillant. En nous rejoignant, vous intégrez un collectif qui valorise
  la diversité, développe le potentiel de ses talents, s’engage dans des initiatives solidaires avec ses partenaires, et se
  mobilise pour réduire son impact environnemental sur tous ses sites et auprès de ses clients.Capgemini est un leader mondial,
  responsable et multiculturel, regroupant près de 350 000 personnes dans plus de 50 pays. Fort de 55 ans d’expérience, nous
  sommes un partenaire stratégique des entreprises pour la transformation de leurs activités en tirant profit de toute la
  puissance de la technologie et des innovations dans les domaines en perpétuelle évolution tels que le cloud, la data, l’Intelligence
  Artificielle, la connectivité, les logiciels, l’ingénierie digitale ou les plateformes.'
