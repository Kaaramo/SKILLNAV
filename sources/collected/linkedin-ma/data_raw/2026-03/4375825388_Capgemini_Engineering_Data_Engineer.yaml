  et la mise en œuvre de solutions de planification au sein d’environnements complexes et internationaux.Ce rôle s’adresse
  à un profil Bac+5 disposant de 6 à 8 ans d’expérience, avec une expertise solide en SAC Planning et une forte capacité à
  interagir avec les équipes métiers et IT.Profil recherché:FormationBac+5 / Diplôme d’ingénieur en Informatique, Data & Analytics,
  Systèmes d’Information ou équivalent.ExpérienceEntre 6 et 8 ans d’expérience en SAP Data & Analytics.Très bonne maîtrise
  de SAP Analytics Cloud (SAC) Planning, idéalement avec au moins 1 à 2 cycles complets d’implémentation.Connaissance de SAP
  BPC Planning appréciée.Expérience sur des projets Finance & Data dans un environnement SAP S/4HANA.Aisance dans les interactions
  avec des équipes internationales et environnement consulting (GSIs / Big 4 = un plus mais pas obligatoire à ce niveau).Capacité
  à communiquer efficacement avec des parties prenantes techniques et fonctionnelles.Compétences techniquesTrès bonne compréhension
  des processus de planification et du financial modelling.Forte capacité d’analyse, structuration documentaire et présentation
  des solutions.Bonne maîtrise de l’anglais professionnel ; l’arabe est un plus selon la région.Expérience en secteurs Retail
  ou Automotive appréciée.Capacité à évoluer dans un environnement agile et multi-disciplinaire.Missions principalesAssurer
  le rôle de Techno-Functional Lead dans les projets SAP Analytics Cloud (SAC) Planning.Concevoir et modéliser des solutions
  SAC alignées avec les processus métier et les standards SAP.Préparer et animer des workshops : définition des besoins, analyse
  des processus, design thinking, etc.Rédiger la documentation fonctionnelle :Functional Design DocumentsInterface specificationsSolution
  and process blueprintsCollaborer avec les équipes data, finance et S/4HANA pour garantir la cohérence globale de la solution.Soutenir
  les phases de tests, d’intégration, de validation et de migration.Participer à la coordination des livrables, au suivi des
  parties prenantes et à la résolution des problématiques techniques.Jouer un rôle clé dans la communication avec les équipes
  métier et IT sur des projets multi-pays.Notre engagement et priorités:Le groupe Capgemini encourage une culture inclusive
