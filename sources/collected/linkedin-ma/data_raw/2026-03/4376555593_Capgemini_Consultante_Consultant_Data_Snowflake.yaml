description: 'Choisir Capgemini, c’est choisir une entreprise où vous serez en mesure de façonner votre carrière selon vos
  aspirations. Avec le soutien et l''inspiration d''une communauté d’experts dans le monde entier, vous pourrez réécrire votre
  futur. Rejoignez-nous pour redéfinir les limites de ce qui est possible, contribuer à libérer la valeur de la technologie
  pour les plus grandes organisations et participer à la construction d’un monde plus durable et inclusif.Votre missionAu
  sein de nos équipes projet, vous contribuerez au développement de solutions digitales innovantes pour des clients grands
  comptes dans les secteurs banque, assurance, énergie et industrie. Vous intégrerez une équipe pluridisciplinaire, organisée
  en mode Agile, et intervenant sur des projets à fort impact métier.En tant que Consultante/Consultant Data – Snowflake ,
  vous interviendrez dans des missions variées telles que :Concevoir et mettre en œuvre des solutions de stockage et de traitement
  des données sur la plateforme Snowflake, en respectant les standards de performance et de sécurité. Développer et optimiser
  des pipelines de données pour alimenter le Data Warehouse, en intégrant des sources variées (cloud, on-premise). Collaborer
  avec les équipes métiers et techniques pour comprendre les besoins et proposer des architectures adaptées. Assurer la qualité,
  la fiabilité et la gouvernance des données (contrôles, traçabilité, conformité). Participer à l’amélioration continue des
  processus et à l’intégration des bonnes pratiques DataOps/Cloud.Votre profilDiplôme Bac+5 en informatique ou systèmes d’information,
  avec une expérience confirmée (3 ans ou plus) sur Snowflake et les environnements Cloud (Azure, AWS ou GCP). Bonne maîtrise
  du langage SQL et des concepts de Data Warehouse et modélisation dimensionnelle. Connaissance des outils d’intégration et
  d’orchestration (ETL/ELT, pipelines, scheduling). Capacité à travailler en équipe, sens de l’organisation et aptitude à
  communiquer avec des interlocuteurs métiers et techniques. Esprit analytique, autonomie et capacité à résoudre des problèmes
  complexes dans des contextes multi-projets.Quelques raisons de nous rejoindreQualité de vie au travail : Possibilité de
  télétravail au Maroc ainsi qu’a l’international et autonomie dans l’organisation de votre quotidien, missions hybrides selon
  vos préférences.Apprentissage en continu : accédez aux formations et certifications dédiées à votre techno, accompagnement
  personnalisé et parcours d’intégration structuré.Projets variés et à fort impact : intervenez auprès de grands comptés dans
  des secteurs diversifiés avec des enjeux métiers et technologiques stimulants. Écosystème d’expertise : bénéficiez d’un
  accompagnement technique personnalisé et d’une intégration active dans nos communautés métiers.Nos engagements et prioritésLe
  groupe Capgemini encourage une culture inclusive dans un cadre multiculturel et handi-accueillant. En nous rejoignant, vous
  intégrez un collectif qui valorise la diversité, développe le potentiel de ses talents, s’engage dans des initiatives solidaires
  avec ses partenaires, et se mobilise pour réduire son impact environnemental sur tous ses sites et auprès de ses clients.Capgemini
  est un leader mondial, responsable et multiculturel, regroupant près de 350 000 personnes dans plus de 50 pays. Fort de
  55 ans d’expérience, nous sommes un partenaire stratégique des entreprises pour la transformation de leurs activités en
  tirant profit de toute la puissance de la technologie et des innovations dans les domaines en perpétuelle évolution tels
  que le cloud, la data, l’Intelligence Artificielle, la connectivité, les logiciels, l’ingénierie digitale ou les plateformes.'
