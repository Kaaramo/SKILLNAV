  en Python, SQL et frameworks distribués (Spark, Beam…).Expertise en conception d’architectures data : Data Lake, Lakehouse,
  Data Warehouse moderne.Connaissance des bonnes pratiques de CI/CD, versioning et automatisation (Git, Jenkins, Cloud Build…).Maîtrise
  des environnements DevOps/MLOps : Docker, orchestration (Airflow, Cloud Composer…), monitoring.Solides bases en sécurité
  et gouvernance des données.Capacité à analyser, résoudre des problèmes complexes et proposer des solutions techniques fiables.Bon
