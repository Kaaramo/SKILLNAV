  initiatives solidaires avec ses partenaires, et se mobilise pour réduire son impact environnemental sur tous ses sites et
  auprès de ses clients.Votre missionEn tant que Senior Data Engineer, vous interviendrez dans des missions variées telles
  que :Concevoir, développer et optimiser des architectures data scalables sur Databricks et/ou Google Cloud Platform (GCP).Mettre
  en place et industrialiser des pipelines de données robustes (batch & streaming).Définir et maintenir les standards d’ingénierie
  : bonnes pratiques, sécurité, gouvernance, qualité des données.Collaborer avec les équipes Data Science, Produit et Architecture
  pour transformer les besoins métiers en solutions techniques fiables.Assurer la performance, la disponibilité et la résilience
  des plateformes et traitements data.Participer à la migration, modernisation ou refonte des environnements data existants
  vers Databricks ou GCP.Encadrer techniquement des Data Engineers plus juniors et contribuer à la montée en compétences de
  l’équipe.Documenter les solutions et veiller à l’amélioration continue des processus techniques.Votre profilExpérience confirmée
  (5+ ans) en tant que Data Engineer, idéalement dans des environnements cloud avancés.Maîtrise des technologies Databricks
