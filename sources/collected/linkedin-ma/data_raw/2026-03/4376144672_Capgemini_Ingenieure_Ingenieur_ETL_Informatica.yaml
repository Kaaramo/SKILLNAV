description: 'Choisir Capgemini, c’est choisir une entreprise où vous serez en mesure de façonner votre carrière selon vos
  aspirations. Avec le soutien et l''inspiration d''une communauté d’experts dans le monde entier, vous pourrez réécrire votre
  futur. Rejoignez-nous pour redéfinir les limites de ce qui est possible, contribuer à libérer la valeur de la technologie
  pour les plus grandes organisations et participer à la construction d’un monde plus durable et inclusif.Votre profilConcevoir
  et mettre en œuvre des flux d’intégration de données en utilisant Informatica PowerCenter ou Informatica Cloud (IDMC) pour
  alimenter les systèmes décisionnels. Garantir la qualité, la fiabilité et la sécurité des données traitées, en respectant
  les standards et bonnes pratiques de l’entreprise. Collaborer avec les équipes métiers et techniques pour analyser les besoins,
  définir les règles de transformation et assurer la cohérence des données. Participer à l’optimisation des processus ETL
  (performance, volumétrie) et à l’automatisation des traitements pour améliorer l’efficacité opérationnelle. Documenter les
  solutions développées et accompagner les utilisateurs dans la compréhension des flux et des outils.Votre profilDiplôme Bac+5
  en informatique ou systèmes d’information, avec une expérience confirmée (3 ans ou plus) sur Informatica PowerCenter ou
  Informatica Intelligent Data Management Cloud (IDMC). Bonne maîtrise des concepts ETL, des bases de données relationnelles
  et du langage SQL. Connaissance des environnements décisionnels (Data Warehouse, modélisation dimensionnelle) et des enjeux
  liés à la qualité des données. Capacité à travailler en équipe, sens de l’organisation et aptitude à communiquer avec des
  interlocuteurs métiers et techniques. Esprit analytique, autonomie et capacité à résoudre des problèmes complexes dans des
  contextes multi-projets.Quelques raisons de nous rejoindreQualité de vie au travail : Possibilité de télétravail au Maroc
  ainsi qu’a l’international et autonomie dans l’organisation de votre quotidien, missions hybrides selon vos préférences.Apprentissage
  en continu : accédez aux formations et certifications dédiées à votre techno, accompagnement personnalisé et parcours d’intégration
  structuré.Projets variés et à fort impact : intervenez auprès de grands comptés dans des secteurs diversifiés avec des enjeux
  métiers et technologiques stimulants. Écosystème d’expertise : bénéficiez d’un accompagnement technique personnalisé et
  d’une intégration active dans nos communautés métiers.Nos Engagements Et PrioritésLe groupe Capgemini encourage une culture
  inclusive dans un cadre multiculturel et handi-accueillant. En nous rejoignant, vous intégrez un collectif qui valorise
  la diversité, développe le potentiel de ses talents, s’engage dans des initiatives solidaires avec ses partenaires, et se
  mobilise pour réduire son impact environnemental sur tous ses sites et auprès de ses clients.Capgemini est un leader mondial,
  responsable et multiculturel, regroupant près de 350 000 personnes dans plus de 50 pays. Fort de 55 ans d’expérience, nous
  sommes un partenaire stratégique des entreprises pour la transformation de leurs activités en tirant profit de toute la
  puissance de la technologie et des innovations dans les domaines en perpétuelle évolution tels que le cloud, la data, l’Intelligence
  Artificielle, la connectivité, les logiciels, l’ingénierie digitale ou les plateformes.'
