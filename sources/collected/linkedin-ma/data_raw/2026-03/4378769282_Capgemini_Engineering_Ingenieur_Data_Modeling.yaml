description: 'À propos de l’offre d’emploi :Capgemini Engineering, leader mondial des services d''ingénierie, rassemble des
  équipes d''ingénieurs, de scientifiques et d''architectes pour aider les entreprises les plus innovantes dans le monde à
  libérer leur potentiel.Des voitures autonomes aux robots qui sauvent des vies, nos experts en technologies digitales et
  logicielles sortent des sentiers battus en fournissant des services uniques de R&D et d''ingénierie dans tous les secteurs
  d''activité.Rejoignez-nous pour une carrière pleine d''opportunités, où vous pouvez faire la différence et où aucun jour
  ne se ressemble.À propos de l''offre :Nous recherchons un Ingénieur Data Modelling confirmé, titulaire d’un Bac+5 et disposant
  d’une expérience significative dans la modélisation et la structuration des données.Le rôle consiste à concevoir, développer
  et optimiser des modèles de données pour des environnements analytiques complexes (Data Lakes, Data Warehouses), tout en
  collaborant étroitement avec les équipes métiers et techniques afin d’assurer la qualité, la cohérence et la gouvernance
  des données au sein de l’organisation.Profil recherché :Formation :Bac+5 / Diplôme d’ingénieur ou Master en :Data Engineering,Informatique,Business
  Intelligence,Statistiques / Data Science,ou tout autre domaine équivalent en lien avec la modélisation et la gestion des
  données.Expérience :Concevoir et développer des modèles de données adaptés aux Data Lakes et Data Warehouses.Définir les
  structures de données, les schémas et les relations entre les entités pour garantir une architecture robuste et évolutive.Optimiser
  les modèles pour assurer les performances, la scalabilité et la qualité des traitements analytiques.Collaborer avec les
  équipes métiers afin de comprendre leurs besoins et les traduire en modèles de données pertinents.Garantir la qualité, l’intégrité
  et la cohérence des données tout au long des pipelines analytiques.Compétences techniques :Solide maîtrise des technologies
  : SQL, Python, R, ainsi que des outils de visualisation Tableau et Power BI.Expérience avérée avec les solutions ETL et
  les plateformes de gestion et gouvernance de données : Informatica, Collibra, Talend.Connaissance des environnements Big
  Data, notamment Hadoop et Spark.Priorités techniques : Modélisation de données, Data Warehousing, ETL SQL, NoSQL, Big Data,
  Data Quality Business Intelligence, Data Governance Métadonnées, Normalisation, Schémas dimensionnelsMissions principales
  :Participer à la conception et à l’implémentation de solutions de Data Warehousing, incluant la modélisation relationnelle
  et dimensionnelle.Travailler sur les processus ETL/ELT pour structurer et transformer les données de manière fiable et performante.Utiliser
  et optimiser des environnements SQL, NoSQL et Big Data (Hadoop, Spark) pour répondre aux exigences métier.Développer et
  maintenir des modèles répondant aux normes de Data Governance, incluant métadonnées, normalisation et schémas dimensionnels.Analyser,
  structurer et formaliser les besoins afin de garantir l’alignement entre la vision métier et les modèles de données livrés.Notre
  engagement et priorités:Le groupe Capgemini encourage une culture inclusive dans un cadre multiculturel et handi-accueillant.
  En nous rejoignant, vous intégrez un collectif qui valorise la diversité, développe le potentiel de ses talents, s’engage
  dans des initiatives solidaires avec ses partenaires, et se mobilise pour réduire son impact environnemental sur tous ses
  sites et auprès de ses clients.Capgemini est un leader mondial, responsable et multiculturel, regroupant près de 350 000
  personnes dans plus de 50 pays. Fort de 55 ans d’expérience, nous sommes un partenaire stratégique des entreprises pour
  la transformation de leurs activités en tirant profit de toute la puissance de la technologie et des innovations dans les
  domaines en perpétuelle évolution tels que le cloud, la data, l’Intelligence Artificielle, la connectivité, les logiciels,
  l’ingénierie digitale ou les plateformes.'
