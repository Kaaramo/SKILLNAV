  de décision du Management et améliorer les performances et les stratégies Marketing et commerciales de l’entreprise.Activités
  Du PosteLe Data Analyst exerce tout ou une partie des activités principales suivantes :Collecter, agréger et nettoyer des
  données en vue de réaliser des études sur les données entrepriseModéliser et enrichir les entrepôts de données et les datamarts
