description: 'Attijariwafa bank est le premier groupe bancaire et financier du Maghreb et un acteur financier de référence
  en Afrique. En plus de l’activité bancaire, le Groupe opère, à travers des filiales spécialisées, dans tous les métiers
  financiers : assurance, crédit immobilier, crédit à la consommation, leasing, gestion d’actifs, intermédiation boursière,
  conseil, location longue durée, factoring… Attijariwafa bank est basée au Maroc et opère dans 25 pays. Avec 20 602 collaborateurs,
  le groupe Attijariwafa bank compte 10,2 millions de clients. Il dispose du réseau de distribution le plus large au Maroc
  et le plus dense en Afrique avec 5 265 agences.Notre banque, leader dans le secteur financier national, est à la recherche
  d''un Data Analyst Senior pour rejoindre notre équipe gouvernance de données au sein du Data Office. En tant que membre
  clé de notre équipe, vous participerez activement à la mise en application de la stratégie Data Management en termes d''amélioration
  de la qualité de données et de la bonne gestion des MétaData et des données de référence (Master Data Management) de la
  banque et de ses filiales conformément aux orientations stratégiques du Groupe.Vos missions : Veiller au respect des politiques
  et processus data liées à la qualité de la donnée, MétaData et MDM. Expertise en matière d''analyse et profiling de données,
  développement des datajobs, et remédiation des données. Expertise en matière de conception, design et développement de solutions
  de Dashbording. Pilotage et suivi de l''activité Data Quality, MetaData & MDM. Accompagnement des métiers et des acteurs
  de l''organisation Data dans leurs besoins d''amélioration de la qualité de données, gestion des référentiels et dictionnaires
  de données. Administration et évolution de la plateforme Data Management. Conduite de projets et initiatives Data tout en
  respectant les délais, budgets et la qualité des livrables. Développement des modèles prédictifs et des algorithmes complexes
  pour améliorer la qualité el la remédiation des données.Profil recherché : Diplôme d’ingénieur en informatique/statistiques
  ou équivalent. Expérience professionnelle pertinente (5ans et plus) en tant que Data Analyst, Consultant Business Intelligence,
  Data Scientist, de préférence dans le secteur financier. Capacité démontrée à travailler avec de grands ensembles de données
  et à tirer des insights significatifs. Bonnes capacités d’analyse, de synthèse et d’organisation. Management d’équipe et
  leadership. Excellentes compétences en communication et capacité à travailler en équipe. Maîtrise des langages de programmation/requêtage
  tels que Python, SQL, SAS. Maitrise d’au moins un outil de Dashboarding (SAS Visual Analytics, QlikView, BO, QlikSense,
  Tableau, Power BI, …) Capacités d’écoute et orientation client.'
