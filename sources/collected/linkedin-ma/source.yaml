url_patterns:
  search: "https://ma.linkedin.com/jobs/search?keywords={keyword}&location=Morocco"
  detail: "https://ma.linkedin.com/jobs/view/{slug}-{linkedin_id}"
  id_pattern: "^[0-9]{10}$"

anti_bot:
  curl_direct: blocked
  webfetch: blocked
  pagination_without_auth: blocked
  playwright_real_browser: works_but_incomplete  # listings only, pas les détails complets
  apify_actor_official: best  # méthode retenue

