# Constat: LinkedIn MA saturé après 8 runs Apify ($3.83 → 207 fiches).
# Hypothèse: les grandes entreprises MA postent en direct sur leurs pages
# carrière (banques, telecom, OCP) avec historique 6-12 mois conservé,
# souvent invisible dans le LinkedIn search live.
#
# Méthode: 3 phases
#   Phase 1: reconnaissance URLs canoniques + faisabilité (en cours)
#   Phase 2: scraping listings via Firecrawl
#   Phase 3: Wayback Machine pour récupérer 2023-2024 archivés

