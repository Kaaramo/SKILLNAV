# ─── Stack pipeline ──────────────────────────────────────────────────────────
production_pipeline:
  scraper_module: skillnav.scrapers.rekrute
  persistence: mongodb.raw_jobs
  dedup_strategy: sha256(company + title + location + posted_date)
  extraction_strategy: pydantic_ai_claude_sonnet_4_5
  fallback_tool: crawl4ai_then_firecrawl

# ─── Différences vs ANAPEC ───────────────────────────────────────────────────
comparison_with_anapec:
  volume: rekrute_4x_higher
  brand_visibility: rekrute_named_entities  # vs ANAPEC mostly anonymous
  seniority_range: rekrute_full  # ANAPEC = junior/mid only
  salary_disclosure: anapec_better  # ANAPEC publie salaires plus souvent
  tech_depth: rekrute_deeper  # stack exact (Databricks, MLflow, Azure ML, etc.)
  data_ai_specificity: rekrute_dominant  # data scientist / ML engineer / data architect existent en volume
