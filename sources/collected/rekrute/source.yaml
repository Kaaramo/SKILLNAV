next_action: |
  Sprint 2 — exhaustivité Rekrute via :
  1. Itération IDs séquentiels 145000-180000 par range (~35k IDs à tester, ~5% match probable = ~1750 candidats)
  2. Recherche entreprise par entreprise via 'site:rekrute.com <company>'
