source_id: rekrute
source_name: Rekrute — Premier portail emploi du Maroc
source_url: https://www.rekrute.com/
country: MA
language: fr

# ─── Classification SKILLNAV ─────────────────────────────────────────────────
tier: T1
priority: true
category: job_board_maroc
mcp_tool: crawl4ai  # production · sample fait avec playwright
collection_frequency: daily

# ─── Conformité (CLAUDE.md §N4) ──────────────────────────────────────────────
robots_txt_compliant: true
robots_txt_checked_at: 2026-05-14
tos_reviewed_at: 2026-05-14
rate_limit_seconds: 5
user_agent: "SkillnavBot/1.0 (Academic; M242 ENSA-Tetouan)"
personal_data_policy: stripped
entity_focus: morale_only

# ─── URL patterns ────────────────────────────────────────────────────────────
url_patterns:
  search: "https://www.rekrute.com/offres.html?keyword={keyword}&s=1"
  detail: "https://www.rekrute.com/offre-emploi-{slug}-{id}.html"
  ref_pattern: "^[0-9]{6}$"  # ex: 182774, 181033

# ─── Sample sprint 1 ─────────────────────────────────────────────────────────
sample_collected_at: 2026-05-14T21:00:00Z
sample_count: 32  # 20 initial + 12 historique
sample_scope: data_ai_strict_only_2023_2026
collection_strategy: hybrid
strategies_used:
  - playwright_live_listings  # active jobs (Rekrute search interface)
  - google_search_site_rekrute_dot_com  # discover old URLs still in index
  - curl_direct_html_download  # Rekrute preserves expired job URLs (HTTP 200)
  - python_regex_extraction  # parse date pub, niveau, contrat, télétravail, skills, etc.

sample_queries:
  # Phase 1 — Live listings (active jobs)
  - keyword: "data scientist"
    method: playwright_search
    total_results: 12
    matches_relevant: 6
  - keyword: "data engineer"
    method: playwright_search
    total_results: 10
    matches_relevant: 4
  - keyword: "data analyst"
    method: playwright_search
    total_results: 10
    matches_relevant: 7
  - keyword: "machine learning"
    method: playwright_search
    total_results: 8
    matches_relevant: 5
  - keyword: "ml engineer"
    method: playwright_search
    total_results: 4
    matches_relevant: 0
  # Phase 2 — Google site:rekrute.com (historic)
  - keyword: 'site:rekrute.com "data scientist" 2024'
    method: google_search
    matches_relevant: 10
  - keyword: 'site:rekrute.com "data scientist" 2025'
    method: google_search
    matches_relevant: 8
  - keyword: 'site:rekrute.com "data engineer" 2024 OR 2023'
    method: google_search
    matches_relevant: 6
  - keyword: 'site:rekrute.com "data analyst" 2024'
    method: google_search
    matches_relevant: 7
  - keyword: 'site:rekrute.com "data analyst" 2023'
    method: google_search
    matches_relevant: 5
  - keyword: 'site:rekrute.com "machine learning" engineer 2025 Maroc'
    method: google_search
    matches_relevant: 4
unique_data_ai_postings_collected: 32

