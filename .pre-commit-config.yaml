# Pre-commit hooks pour SKILLNAV
# Installation : poetry run pre-commit install
# Run manuel    : poetry run pre-commit run --all-files
# Référence     : https://pre-commit.com/

repos:
  # ─── Hygiène générale ─────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: \.ipynb$
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: end-of-file-fixer
        exclude: \.ipynb$
      - id: trailing-whitespace
        exclude: \.ipynb$|\.md$
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ─── Python : ruff (lint + format) ────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ─── Python : mypy (type-check) ───────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.7
          - types-pyyaml
        args: [--config-file=pyproject.toml]
        exclude: ^(notebooks|tests|data|docs)

  # ─── Sécurité : secrets ───────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: poetry\.lock|package-lock\.json|pnpm-lock\.yaml
